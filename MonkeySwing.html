<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Monkey Swing 🐒🍌</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:Arial,sans-serif;touch-action:none}canvas{display:block;max-width:100vw;max-height:100vh}</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),GW=400,GH=700;canvas.width=GW;canvas.height=GH;
let gameState='menu',score=0,highScore=parseInt(localStorage.getItem('msHS')||'0'),frameCount=0,speed=3,bananaCount=0;
const C={sky1:'#87CEEB',sky2:'#E0F7FA',trunk:'#5D4037',trunkDark:'#3E2723',leaf:'#4CAF50',leafLight:'#81C784',banana:'#FFD600',bananaDark:'#F9A825',monkey:'#8D6E63',monkeyLight:'#A1887F',monkeyDark:'#5D4037',monkeyBelly:'#D7CCC8',ground:'#33691E',groundDark:'#1B5E20',text:'#FFF',textShadow:'#1a1a2e'};
const mk={x:80,y:GH/2,w:40,h:40,vel:0,grav:0.45,jmp:-8,rot:0};
let obs=[],bans=[],parts=[],clouds=[];
const GAP=160,OW=60,SPD=3;let oTimer=0;const OINT=100;
for(let i=0;i<5;i++)clouds.push({x:Math.random()*GW,y:Math.random()*200,w:60+Math.random()*80,s:0.3+Math.random()*0.5});
let gX=0;
function drawSky(){const g=ctx.createLinearGradient(0,0,0,GH);g.addColorStop(0,C.sky1);g.addColorStop(1,C.sky2);ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH)}
function drawClouds(){ctx.fillStyle='rgba(255,255,255,0.7)';clouds.forEach(c=>{ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,20,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(c.x-c.w/4,c.y-10,c.w/3,15,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(c.x+c.w/4,c.y-5,c.w/3,18,0,0,Math.PI*2);ctx.fill()})}
function drawGround(){ctx.fillStyle=C.ground;ctx.fillRect(0,GH-60,GW,60);ctx.fillStyle=C.groundDark;for(let i=0;i<GW+20;i+=20){const x=((i-gX)%(GW+20)+GW+20)%(GW+20)-10;ctx.beginPath();ctx.moveTo(x,GH-60);ctx.lineTo(x+10,GH-72);ctx.lineTo(x+20,GH-60);ctx.fill()}ctx.fillStyle='#4E342E';ctx.fillRect(0,GH-60,GW,3)}
function drawTree(x,th,by){ctx.fillStyle=C.trunk;ctx.fillRect(x,0,OW,th);ctx.fillStyle=C.trunkDark;for(let t=10;t<th;t+=25)ctx.fillRect(x+5,t,OW-10,3);ctx.fillStyle=C.leaf;ctx.beginPath();ctx.ellipse(x+OW/2,th,OW/2+10,20,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=C.leafLight;ctx.beginPath();ctx.ellipse(x+OW/2-5,th-5,OW/2,12,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#2E7D32';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+OW/2,th);ctx.quadraticCurveTo(x+OW/2+15,th+20,x+OW/2,th+30);ctx.stroke();ctx.fillStyle=C.trunk;ctx.fillRect(x,by,OW,GH-60-by);ctx.fillStyle=C.trunkDark;for(let t=by+10;t<GH-60;t+=25)ctx.fillRect(x+5,t,OW-10,3);ctx.fillStyle=C.leaf;ctx.beginPath();ctx.ellipse(x+OW/2,by,OW/2+10,20,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=C.leafLight;ctx.beginPath();ctx.ellipse(x+OW/2+5,by+5,OW/2,12,0,0,Math.PI*2);ctx.fill()}
function drawMonkey(){ctx.save();ctx.translate(mk.x+mk.w/2,mk.y+mk.h/2);mk.rot=Math.min(Math.max(mk.vel*3,-30),60);ctx.rotate(mk.rot*Math.PI/180);const x=-mk.w/2,y=-mk.h/2,tw=Math.sin(frameCount*0.1)*5,aw=Math.sin(frameCount*0.15)*8;ctx.strokeStyle=C.monkeyDark;ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x,y+mk.h/2);ctx.quadraticCurveTo(x-15,y+tw,x-20,y-10+tw);ctx.stroke();ctx.fillStyle=C.monkey;ctx.beginPath();ctx.ellipse(x+mk.w/2,y+mk.h/2+3,16,18,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=C.monkeyBelly;ctx.beginPath();ctx.ellipse(x+mk.w/2+2,y+mk.h/2+5,10,12,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=C.monkey;ctx.beginPath();ctx.ellipse(x+mk.w/2+5,y+12,14,13,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=C.monkeyBelly;ctx.beginPath();ctx.ellipse(x+mk.w/2+8,y+14,9,9,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(x+mk.w/2+6,y+10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+mk.w/2+14,y+10,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(x+mk.w/2+7,y+9,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+mk.w/2+15,y+9,1,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5D4037';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x+mk.w/2+10,y+16,4,0,Math.PI);ctx.stroke();ctx.fillStyle=C.monkeyLight;ctx.beginPath();ctx.ellipse(x+mk.w/2-5,y+6,5,6,-0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+mk.w/2+18,y+6,5,6,0.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFAB91';ctx.beginPath();ctx.ellipse(x+mk.w/2-5,y+6,3,4,-0.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(x+mk.w/2+18,y+6,3,4,0.3,0,Math.PI*2);ctx.fill();ctx.strokeStyle=C.monkey;ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x+5,y+mk.h/2);ctx.lineTo(x-5,y+mk.h/2-10+aw);ctx.stroke();ctx.beginPath();ctx.moveTo(x+mk.w-5,y+mk.h/2);ctx.lineTo(x+mk.w+5,y+mk.h/2-10-aw);ctx.stroke();ctx.fillStyle=C.monkeyBelly;ctx.beginPath();ctx.arc(x-5,y+mk.h/2-10+aw,4,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+mk.w+5,y+mk.h/2-10-aw,4,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawBanana(bx,by,s){ctx.save();ctx.translate(bx,by);ctx.rotate(Math.sin(frameCount*0.05+bx)*0.3);ctx.fillStyle=C.banana;ctx.beginPath();ctx.moveTo(-s/2,0);ctx.quadraticCurveTo(-s/2,-s,0,-s);ctx.quadraticCurveTo(s/2,-s,s/2,0);ctx.quadraticCurveTo(s/3,s/3,0,s/4);ctx.quadraticCurveTo(-s/3,s/3,-s/2,0);ctx.fill();ctx.fillStyle=C.bananaDark;ctx.beginPath();ctx.moveTo(-s/4,-s/4);ctx.quadraticCurveTo(0,-s*0.8,s/4,-s/4);ctx.quadraticCurveTo(0,-s*0.5,-s/4,-s/4);ctx.fill();ctx.fillStyle='#795548';ctx.beginPath();ctx.arc(0,-s+2,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.ellipse(-s/6,-s/2,2,6,-0.3,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawParts(){parts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.02;p.vy+=0.1;if(p.life<=0){parts.splice(i,1);return}ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})}
function drawScore(){ctx.fillStyle=C.textShadow;ctx.font='bold 48px Arial';ctx.textAlign='center';ctx.fillText(score,GW/2+2,72);ctx.fillStyle=C.text;ctx.fillText(score,GW/2,70);ctx.font='bold 20px Arial';ctx.textAlign='left';ctx.fillStyle=C.banana;ctx.fillText('🍌 '+bananaCount,15,35)}
function drawMenu(){drawSky();drawClouds();drawGround();ctx.fillStyle=C.textShadow;ctx.font='bold 42px Arial';ctx.textAlign='center';ctx.fillText('MONKEY',GW/2+2,182);ctx.fillText('SWING',GW/2+2,232);ctx.fillStyle='#FFD600';ctx.fillText('MONKEY',GW/2,180);ctx.fillStyle='#4CAF50';ctx.fillText('SWING',GW/2,230);const om={...mk};Object.assign(mk,{x:GW/2-30,y:280,vel:0});drawMonkey();Object.assign(mk,om);drawBanana(GW/2+40,300,20);drawBanana(GW/2-50,320,15);ctx.fillStyle='#388E3C';ctx.beginPath();ctx.roundRect(GW/2-80,423,160,55,12);ctx.fill();ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(GW/2-80,420,160,52,12);ctx.fill();ctx.fillStyle='#FFF';ctx.font='bold 24px Arial';ctx.fillText('CHƠI NGAY',GW/2,454);ctx.fillStyle='#FFF';ctx.font='18px Arial';ctx.fillText('🏆 Kỷ lục: '+highScore,GW/2,520);ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='14px Arial';ctx.fillText('Chạm màn hình để chơi',GW/2,560)}
function drawGO(){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,GW,GH);ctx.fillStyle='#FFF';ctx.beginPath();ctx.roundRect(GW/2-120,180,240,300,16);ctx.fill();ctx.fillStyle='#F5F5F5';ctx.beginPath();ctx.roundRect(GW/2-110,240,220,100,10);ctx.fill();ctx.fillStyle='#F44336';ctx.font='bold 28px Arial';ctx.textAlign='center';ctx.fillText('GAME OVER',GW/2,225);ctx.fillStyle='#333';ctx.font='16px Arial';ctx.fillText('Điểm số',GW/2,270);ctx.font='bold 36px Arial';ctx.fillStyle='#FF9800';ctx.fillText(score,GW/2,310);ctx.font='16px Arial';ctx.fillStyle='#333';ctx.fillText('Kỷ lục',GW/2,360);ctx.font='bold 24px Arial';ctx.fillStyle='#4CAF50';ctx.fillText(highScore,GW/2,390);if(score>=highScore&&score>0){ctx.fillStyle='#F44336';ctx.font='bold 16px Arial';ctx.fillText('🎉 KỶ LỤC MỚI! 🎉',GW/2,420)}ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(GW/2-70,430,140,40,8);ctx.fill();ctx.fillStyle='#FFF';ctx.font='bold 18px Arial';ctx.fillText('CHƠI LẠI',GW/2,456)}
function spawn(){const min=80,max=GH-60-GAP-80,th=Math.floor(Math.random()*(max-min))+min,by=th+GAP;obs.push({x:GW,th,by,scored:false});bans.push({x:GW+OW/2,y:th+GAP/2,s:18,col:false})}
function spawnP(x,y,c,n){for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,size:Math.random()*4+2,life:1,color:c})}
function checkCol(){const x=mk.x+5,y=mk.y+5,w=mk.w-10,h=mk.h-10;if(y+h>=GH-60||y<=0)return true;for(const o of obs)if(x+w>o.x&&x<o.x+OW&&(y<o.th||y+h>o.by))return true;return false}
function checkBan(){bans.forEach(b=>{if(b.col)return;const dx=(mk.x+mk.w/2)-b.x,dy=(mk.y+mk.h/2)-b.y;if(Math.sqrt(dx*dx+dy*dy)<30){b.col=true;bananaCount++;spawnP(b.x,b.y,C.banana,8)}})}
function reset(){mk.y=GH/2;mk.vel=0;mk.rot=0;obs=[];bans=[];parts=[];score=0;bananaCount=0;speed=SPD;oTimer=0;frameCount=0}
function jump(){if(gameState==='menu'){gameState='playing';reset();return}if(gameState==='playing'){mk.vel=mk.jmp;spawnP(mk.x,mk.y+mk.h,'rgba(255,255,255,0.5)',3)}if(gameState==='gameover')gameState='menu'}
function update(){if(gameState!=='playing')return;frameCount++;mk.vel+=mk.grav;mk.y+=mk.vel;speed=SPD+Math.floor(score/5)*0.3;speed=Math.min(speed,7);oTimer++;if(oTimer>=OINT-Math.min(score*2,30)){spawn();oTimer=0}obs.forEach(o=>{o.x-=speed;if(!o.scored&&o.x+OW<mk.x){o.scored=true;score++}});obs=obs.filter(o=>o.x>-OW);bans=bans.filter(b=>b.x>-30);bans.forEach(b=>b.x-=speed);clouds.forEach(c=>{c.x-=c.s;if(c.x<-c.w)c.x=GW+c.w});gX=(gX+speed)%20;checkBan();if(checkCol()){gameState='gameover';if(score>highScore){highScore=score;localStorage.setItem('msHS',highScore+'')}spawnP(mk.x+mk.w/2,mk.y+mk.h/2,'#F44336',15)}}
function render(){ctx.clearRect(0,0,GW,GH);if(gameState==='menu'){drawMenu();return}drawSky();drawClouds();obs.forEach(o=>drawTree(o.x,o.th,o.by));bans.forEach(b=>{if(!b.col)drawBanana(b.x,b.y,b.s)});drawGround();drawMonkey();drawParts();drawScore();if(gameState==='gameover')drawGO()}
function loop(){update();render();requestAnimationFrame(loop)}
canvas.addEventListener('pointerdown',e=>{e.preventDefault();jump()});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump()}});
function resize(){const r=Math.min(window.innerWidth/GW,window.innerHeight/GH);canvas.style.width=GW*r+'px';canvas.style.height=GH*r+'px'}
window.addEventListener('resize',resize);resize();loop();
</script>
</body>
</html>
