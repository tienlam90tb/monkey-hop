<body>
<canvas id="game"></canvas>
<script>
// ============================================
//  MONKEY SWING 🐒🍌 - FULL VERSION
// ============================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 400, GH = 700;
canvas.width = GW; canvas.height = GH;

// ===== AUDIO ENGINE (Web Audio API) =====
let audioCtx = null;
let musicEnabled = true, sfxEnabled = true;
let bgmOsc1 = null, bgmOsc2 = null, bgmGain = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function sfxJump() {
    if (!audioCtx || !sfxEnabled) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function sfxCollect(pitch) {
    if (!audioCtx || !sfxEnabled) return;
    const base = 800 + (pitch || 0) * 100;
    [0, 0.06].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = base + i * 400;
        g.gain.setValueAtTime(0.12, audioCtx.currentTime + t);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + t + 0.08);
        o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + 0.08);
    });
}

function sfxHit() {
    if (!audioCtx || !sfxEnabled) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    s.buffer = buf; s.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    s.start();
}

function sfxPowerUp() {
    if (!audioCtx || !sfxEnabled) return;
    [400, 600, 800, 1000].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = f;
        const t = audioCtx.currentTime + i * 0.06;
        g.gain.setValueAtTime(0.1, t);
        g.gain.linearRampToValueAtTime(0, t + 0.08);
        o.start(t); o.stop(t + 0.08);
    });
}

function startBGM() {
    if (!audioCtx || !musicEnabled) return;
    stopBGM();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.04;
    bgmGain.connect(audioCtx.destination);
    const notes = [262, 294, 330, 392, 440, 392, 330, 294];
    const playLoop = () => {
        notes.forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.type = 'square';
            o.frequency.value = f / 2;
            const t = audioCtx.currentTime + i * 0.25;
            g.gain.setValueAtTime(0.5, t);
            g.gain.linearRampToValueAtTime(0, t + 0.2);
            o.start(t); o.stop(t + 0.25);
        });
    };
    playLoop();
    bgmOsc1 = setInterval(playLoop, notes.length * 250);
}

function stopBGM() {
    if (bgmOsc1) { clearInterval(bgmOsc1); bgmOsc1 = null; }
}

// ===== THEMES =====
const themes = [
    {
        name: 'Rừng', minScore: 0,
        sky1: '#87CEEB', sky2: '#E0F7FA',
        trunk: '#5D4037', trunkDark: '#3E2723',
        leaf: '#4CAF50', leafLight: '#81C784',
        ground: '#33691E', groundDark: '#1B5E20', groundLine: '#4E342E',
        bgLayers: [
            { color: '#2E7D32', y: 500, shapes: 'mountains', speed: 0.2 },
            { color: '#388E3C', y: 520, shapes: 'trees', speed: 0.4 },
        ],
    },
    {
        name: 'Biển', minScore: 15,
        sky1: '#1565C0', sky2: '#4DD0E1',
        trunk: '#455A64', trunkDark: '#37474F',
        leaf: '#00838F', leafLight: '#26C6DA',
        ground: '#0D47A1', groundDark: '#1565C0', groundLine: '#1976D2',
        bgLayers: [
            { color: '#1976D2', y: 480, shapes: 'waves', speed: 0.3 },
            { color: '#1E88E5', y: 510, shapes: 'waves', speed: 0.5 },
        ],
    },
    {
        name: 'Núi Lửa', minScore: 35,
        sky1: '#BF360C', sky2: '#FF6F00',
        trunk: '#424242', trunkDark: '#212121',
        leaf: '#FF5722', leafLight: '#FF8A65',
        ground: '#3E2723', groundDark: '#4E342E', groundLine: '#D84315',
        bgLayers: [
            { color: '#E65100', y: 490, shapes: 'mountains', speed: 0.2 },
            { color: '#BF360C', y: 520, shapes: 'lava', speed: 0.6 },
        ],
    },
    {
        name: 'Vũ Trụ', minScore: 60,
        sky1: '#0D0D2B', sky2: '#1A1A4E',
        trunk: '#37474F', trunkDark: '#263238',
        leaf: '#7C4DFF', leafLight: '#B388FF',
        ground: '#1A237E', groundDark: '#283593', groundLine: '#3F51B5',
        bgLayers: [
            { color: '#311B92', y: 500, shapes: 'stars', speed: 0.1 },
        ],
    },
];

let currentThemeIdx = 0;
function getTheme() { return themes[currentThemeIdx]; }

// ===== SKINS =====
const skins = [
    { id: 'default', name: 'Khỉ Nâu', cost: 0, body: '#8D6E63', belly: '#D7CCC8', light: '#A1887F', dark: '#5D4037', ear: '#FFAB91' },
    { id: 'golden', name: 'Khỉ Vàng', cost: 50, body: '#FFD600', belly: '#FFF9C4', light: '#FFEE58', dark: '#F9A825', ear: '#FFE082' },
    { id: 'ninja', name: 'Khỉ Ninja', cost: 100, body: '#212121', belly: '#424242', light: '#616161', dark: '#000000', ear: '#F44336', acc: 'headband' },
    { id: 'pirate', name: 'Cướp Biển', cost: 200, body: '#8D6E63', belly: '#D7CCC8', light: '#A1887F', dark: '#5D4037', ear: '#FFAB91', acc: 'eyepatch' },
    { id: 'astro', name: 'Phi Hành', cost: 500, body: '#E0E0E0', belly: '#F5F5F5', light: '#BDBDBD', dark: '#9E9E9E', ear: '#80DEEA', acc: 'helmet' },
];

let totalBananas = parseInt(localStorage.getItem('msTB') || '0');
let unlockedSkins = JSON.parse(localStorage.getItem('msSkins') || '["default"]');
let currentSkin = localStorage.getItem('msCSkin') || 'default';
function getSkin() { return skins.find(s => s.id === currentSkin) || skins[0]; }

// ===== GAME STATE =====
let gameState = 'menu'; // menu, playing, gameover, shop
let score = 0, highScore = parseInt(localStorage.getItem('msHS') || '0');
let frameCount = 0, speed = 3, bananaCount = 0;
let combo = 0, comboTimer = 0, comboMultiplier = 1;
let currentGap = 160, currentInterval = 100;

const mk = { x: 80, y: GH / 2, w: 40, h: 40, vel: 0, grav: 0.45, jmp: -8, rot: 0 };
let obs = [], bans = [], enemies = [], powerups = [], parts = [], floatTexts = [];
let activePower = { type: null, timer: 0 };
let clouds = [], stars = [];
let gX = 0, oTimer = 0, enemyTimer = 0;
const SPD = 3, OW = 60;

// Init clouds & stars
for (let i = 0; i < 5; i++) clouds.push({ x: Math.random() * GW, y: Math.random() * 200, w: 60 + Math.random() * 80, s: 0.3 + Math.random() * 0.5 });
for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * GW, y: Math.random() * GH, s: Math.random() * 2 + 0.5, b: Math.random() });

// Shop scroll
let shopScroll = 0;

// ===== DRAWING FUNCTIONS =====

function lerpColor(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return `#${((1 << 24) + (r << 16) + (g << 8) + bl).toString(16).slice(1)}`;
}

function drawSky() {
    const T = getTheme();
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, T.sky1);
    grad.addColorStop(1, T.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);
    // Stars for space theme
    if (currentThemeIdx === 3) {
        stars.forEach(s => {
            const bright = 0.3 + Math.sin(frameCount * 0.02 + s.b * 10) * 0.3;
            ctx.fillStyle = `rgba(255,255,255,${bright})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
            ctx.fill();
        });
    }
}

function drawParallax() {
    const T = getTheme();
    T.bgLayers.forEach(layer => {
        ctx.fillStyle = layer.color;
        const offset = (gX * layer.speed) % GW;
        if (layer.shapes === 'mountains') {
            for (let i = -1; i < GW / 80 + 2; i++) {
                const bx = i * 80 - offset % 80;
                ctx.beginPath();
                ctx.moveTo(bx, layer.y + 40);
                ctx.lineTo(bx + 40, layer.y - 20 - (i % 3) * 15);
                ctx.lineTo(bx + 80, layer.y + 40);
                ctx.fill();
            }
        } else if (layer.shapes === 'trees') {
            for (let i = -1; i < GW / 60 + 2; i++) {
                const bx = i * 60 - offset % 60;
                ctx.beginPath();
                ctx.moveTo(bx + 30, layer.y - 30 - (i % 2) * 10);
                ctx.lineTo(bx + 10, layer.y + 20);
                ctx.lineTo(bx + 50, layer.y + 20);
                ctx.fill();
            }
        } else if (layer.shapes === 'waves') {
            ctx.beginPath();
            ctx.moveTo(0, layer.y + 20);
            for (let x = 0; x <= GW; x += 5) {
                ctx.lineTo(x, layer.y + Math.sin((x + offset * 3) * 0.03) * 10);
            }
            ctx.lineTo(GW, GH); ctx.lineTo(0, GH);
            ctx.fill();
        } else if (layer.shapes === 'lava') {
            ctx.fillStyle = `rgba(255,${100 + Math.sin(frameCount * 0.05) * 50},0,0.6)`;
            ctx.beginPath();
            ctx.moveTo(0, layer.y + 20);
            for (let x = 0; x <= GW; x += 5) {
                ctx.lineTo(x, layer.y + Math.sin((x + offset * 5) * 0.04) * 8);
            }
            ctx.lineTo(GW, GH); ctx.lineTo(0, GH);
            ctx.fill();
        } else if (layer.shapes === 'stars') {
            // handled in drawSky
        }
    });
}

function drawClouds() {
    if (currentThemeIdx === 3) return; // no clouds in space
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    clouds.forEach(c => {
        ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, 20, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x - c.w / 4, c.y - 10, c.w / 3, 15, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x + c.w / 4, c.y - 5, c.w / 3, 18, 0, 0, Math.PI * 2); ctx.fill();
    });
}

function drawGround() {
    const T = getTheme();
    ctx.fillStyle = T.ground;
    ctx.fillRect(0, GH - 60, GW, 60);
    ctx.fillStyle = T.groundDark;
    for (let i = 0; i < GW + 20; i += 20) {
        const x = ((i - gX) % (GW + 20) + GW + 20) % (GW + 20) - 10;
        ctx.beginPath(); ctx.moveTo(x, GH - 60); ctx.lineTo(x + 10, GH - 72); ctx.lineTo(x + 20, GH - 60); ctx.fill();
    }
    ctx.fillStyle = T.groundLine;
    ctx.fillRect(0, GH - 60, GW, 3);
}

function drawTree(x, th, by) {
    const T = getTheme();
    ctx.fillStyle = T.trunk;
    ctx.fillRect(x, 0, OW, th);
    ctx.fillStyle = T.trunkDark;
    for (let t = 10; t < th; t += 25) ctx.fillRect(x + 5, t, OW - 10, 3);
    ctx.fillStyle = T.leaf;
    ctx.beginPath(); ctx.ellipse(x + OW / 2, th, OW / 2 + 10, 20, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = T.leafLight;
    ctx.beginPath(); ctx.ellipse(x + OW / 2 - 5, th - 5, OW / 2, 12, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = T.trunk;
    ctx.fillRect(x, by, OW, GH - 60 - by);
    ctx.fillStyle = T.trunkDark;
    for (let t = by + 10; t < GH - 60; t += 25) ctx.fillRect(x + 5, t, OW - 10, 3);
    ctx.fillStyle = T.leaf;
    ctx.beginPath(); ctx.ellipse(x + OW / 2, by, OW / 2 + 10, 20, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = T.leafLight;
    ctx.beginPath(); ctx.ellipse(x + OW / 2 + 5, by + 5, OW / 2, 12, 0, 0, Math.PI * 2); ctx.fill();
}

function drawMonkey() {
    const S = getSkin();
    ctx.save();
    ctx.translate(mk.x + mk.w / 2, mk.y + mk.h / 2);
    mk.rot = Math.min(Math.max(mk.vel * 3, -30), 60);
    ctx.rotate(mk.rot * Math.PI / 180);
    const x = -mk.w / 2, y = -mk.h / 2;
    const tw = Math.sin(frameCount * 0.1) * 5;
    const armUp = mk.vel < -2 ? -8 : mk.vel > 2 ? 8 : 0;
    const aw = Math.sin(frameCount * 0.15) * 8 + armUp;

    // Power-up glow
    if (activePower.type === 'golden') {
        ctx.fillStyle = `rgba(255,215,0,${0.2 + Math.sin(frameCount * 0.1) * 0.15})`;
        ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI * 2); ctx.fill();
    }
    if (activePower.type === 'magnet') {
        ctx.strokeStyle = `rgba(0,150,255,${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 30 + Math.sin(frameCount * 0.2) * 5, 0, Math.PI * 2); ctx.stroke();
    }

    // Trail
    if (gameState === 'playing' && frameCount % 3 === 0) {
        parts.push({ x: mk.x + mk.w / 2, y: mk.y + mk.h / 2, vx: -1, vy: 0, size: 4, life: 0.5, color: S.body, type: 'circle' });
    }

    // Tail
    ctx.strokeStyle = S.dark; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x, y + mk.h / 2);
    ctx.quadraticCurveTo(x - 15, y + tw, x - 20, y - 10 + tw); ctx.stroke();

    // Body
    ctx.fillStyle = S.body;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2, y + mk.h / 2 + 3, 16, 18, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 2, y + mk.h / 2 + 5, 10, 12, 0, 0, Math.PI * 2); ctx.fill();

    // Head
    ctx.fillStyle = S.body;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 5, y + 12, 14, 13, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 8, y + 14, 9, 9, 0, 0, Math.PI * 2); ctx.fill();

    // Eyes
    ctx.fillStyle = '#212121';
    ctx.beginPath(); ctx.arc(x + mk.w / 2 + 6, y + 10, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + mk.w / 2 + 14, y + 10, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x + mk.w / 2 + 7, y + 9, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + mk.w / 2 + 15, y + 9, 1, 0, Math.PI * 2); ctx.fill();

    // Mouth
    ctx.strokeStyle = S.dark; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x + mk.w / 2 + 10, y + 16, 4, 0, Math.PI); ctx.stroke();

    // Ears
    ctx.fillStyle = S.light;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 - 5, y + 6, 5, 6, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 18, y + 6, 5, 6, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = S.ear;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 - 5, y + 6, 3, 4, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 18, y + 6, 3, 4, 0.3, 0, Math.PI * 2); ctx.fill();

    // Arms
    ctx.strokeStyle = S.body; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x + 5, y + mk.h / 2); ctx.lineTo(x - 5, y + mk.h / 2 - 10 + aw); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + mk.w - 5, y + mk.h / 2); ctx.lineTo(x + mk.w + 5, y + mk.h / 2 - 10 - aw); ctx.stroke();
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.arc(x - 5, y + mk.h / 2 - 10 + aw, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + mk.w + 5, y + mk.h / 2 - 10 - aw, 4, 0, Math.PI * 2); ctx.fill();

    // Accessories
    if (S.acc === 'headband') {
        ctx.fillStyle = '#F44336';
        ctx.fillRect(x + mk.w / 2 - 12, y + 2, 28, 4);
        ctx.fillRect(x + mk.w / 2 + 16, y - 4, 4, 12);
    }
    if (S.acc === 'eyepatch') {
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 14, y + 10, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#212121'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x + mk.w / 2 + 9, y + 8); ctx.lineTo(x + mk.w / 2 + 19, y + 5); ctx.stroke();
    }
    if (S.acc === 'helmet') {
        ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 5, y + 10, 16, Math.PI, 0); ctx.stroke();
        ctx.fillStyle = 'rgba(100,200,255,0.3)';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 5, y + 10, 15, Math.PI, 0); ctx.fill();
    }

    ctx.restore();
}

function drawBanana(bx, by, s) {
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate((frameCount * 0.08) % (Math.PI * 2));
    ctx.fillStyle = '#FFD600';
    ctx.beginPath(); ctx.moveTo(-s / 2, 0);
    ctx.quadraticCurveTo(-s / 2, -s, 0, -s);
    ctx.quadraticCurveTo(s / 2, -s, s / 2, 0);
    ctx.quadraticCurveTo(s / 3, s / 3, 0, s / 4);
    ctx.quadraticCurveTo(-s / 3, s / 3, -s / 2, 0);
    ctx.fill();
    ctx.fillStyle = '#795548';
    ctx.beginPath(); ctx.arc(0, -s + 2, 3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawPowerUpItem(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.15;
    ctx.scale(pulse, pulse);
    if (p.type === 'golden') {
        // Golden banana with glow
        ctx.fillStyle = 'rgba(255,215,0,0.3)';
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.fill();
        ctx.rotate((frameCount * 0.08) % (Math.PI * 2));
        ctx.fillStyle = '#FFD700';
        ctx.beginPath(); ctx.moveTo(-10, 0);
        ctx.quadraticCurveTo(-10, -20, 0, -20);
        ctx.quadraticCurveTo(10, -20, 10, 0);
        ctx.quadraticCurveTo(7, 7, 0, 5);
        ctx.quadraticCurveTo(-7, 7, -10, 0);
        ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
        ctx.fillText('★', 0, 4);
    } else if (p.type === 'magnet') {
        // Magnet icon
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(-6, 0, 8, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#2196F3';
        ctx.beginPath(); ctx.arc(6, 0, 8, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#9E9E9E';
        ctx.fillRect(-3, -12, 6, 8);
    }
    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'bee') {
        // Body
        ctx.fillStyle = '#FFD600';
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 9, 0, 0, Math.PI * 2); ctx.fill();
        // Stripes
        ctx.fillStyle = '#212121';
        ctx.fillRect(-4, -9, 3, 18);
        ctx.fillRect(3, -9, 3, 18);
        // Wings
        const wingAngle = Math.sin(frameCount * 0.5) * 0.5;
        ctx.fillStyle = 'rgba(200,230,255,0.7)';
        ctx.beginPath(); ctx.ellipse(-3, -10 + wingAngle * 5, 8, 5, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(3, -10 + wingAngle * 5, 8, 5, 0.3, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(8, -3, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(9, -3, 1.5, 0, Math.PI * 2); ctx.fill();
        // Stinger
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-18, -2); ctx.lineTo(-18, 2); ctx.fill();
    } else if (e.type === 'bat') {
        const wingFlap = Math.sin(frameCount * 0.3) * 15;
        ctx.fillStyle = '#4A148C';
        // Body
        ctx.beginPath(); ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI * 2); ctx.fill();
        // Wings
        ctx.beginPath();
        ctx.moveTo(-5, -3); ctx.lineTo(-25, -15 + wingFlap); ctx.lineTo(-20, 0); ctx.lineTo(-5, 3);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(5, -3); ctx.lineTo(25, -15 + wingFlap); ctx.lineTo(20, 0); ctx.lineTo(5, 3);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#FF1744';
        ctx.beginPath(); ctx.arc(-3, -3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(3, -3, 2, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'snake') {
        ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-15, 0);
        for (let i = -15; i <= 15; i += 2) {
            ctx.lineTo(i, Math.sin((i + frameCount * 0.2) * 0.3) * 6);
        }
        ctx.stroke();
        // Head
        ctx.fillStyle = '#388E3C';
        ctx.beginPath(); ctx.arc(15, Math.sin((15 + frameCount * 0.2) * 0.3) * 6, 5, 0, Math.PI * 2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#FFEB3B';
        ctx.beginPath(); ctx.arc(17, Math.sin((15 + frameCount * 0.2) * 0.3) * 6 - 2, 2, 0, Math.PI * 2); ctx.fill();
        // Tongue
        ctx.strokeStyle = '#F44336'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(20, Math.sin((15 + frameCount * 0.2) * 0.3) * 6);
        ctx.lineTo(25, Math.sin((15 + frameCount * 0.2) * 0.3) * 6 - 2);
        ctx.moveTo(20, Math.sin((15 + frameCount * 0.2) * 0.3) * 6);
        ctx.lineTo(25, Math.sin((15 + frameCount * 0.2) * 0.3) * 6 + 2);
        ctx.stroke();
    }
    ctx.restore();
}

function drawParts() {
    parts.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.vy += 0.08;
        if (p.life <= 0) { parts.splice(i, 1); return; }
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        if (p.type === 'star') {
            drawStar(p.x, p.y, 5, p.size * p.life, p.size * p.life * 0.5);
        } else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    });
}

function drawStar(cx, cy, spikes, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / spikes) - Math.PI / 2;
        ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    }
    ctx.closePath(); ctx.fill();
}

function drawFloatTexts() {
    floatTexts.forEach((ft, i) => {
        ft.y -= 1.5; ft.life -= 0.02;
        if (ft.life <= 0) { floatTexts.splice(i, 1); return; }
        ctx.globalAlpha = ft.life;
        ctx.fillStyle = ft.color;
        ctx.font = `bold ${ft.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1;
    });
}

function drawScore() {
    ctx.fillStyle = '#00000066'; ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center';
    ctx.fillText(score, GW / 2 + 2, 72);
    ctx.fillStyle = '#FFF';
    ctx.fillText(score, GW / 2, 70);
    ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left';
    ctx.fillStyle = '#FFD600';
    ctx.fillText('🍌 ' + bananaCount, 12, 32);

    // Combo
    if (comboMultiplier > 1) {
        ctx.fillStyle = '#FF5722';
        ctx.font = 'bold 22px Arial'; ctx.textAlign = 'right';
        ctx.fillText(`x${comboMultiplier}`, GW - 15, 32);
    }

    // Power-up indicator
    if (activePower.type) {
        const pct = activePower.timer / (activePower.type === 'golden' ? 180 : 300);
        ctx.fillStyle = activePower.type === 'golden' ? '#FFD700' : '#2196F3';
        ctx.fillRect(GW / 2 - 50, 85, 100 * pct, 6);
        ctx.strokeStyle = '#FFF'; ctx.lineWidth = 1;
        ctx.strokeRect(GW / 2 - 50, 85, 100, 6);
    }

    // Theme name
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px Arial'; ctx.textAlign = 'right';
    ctx.fillText(getTheme().name, GW - 10, GH - 68);

    // Sound toggles
    ctx.font = '18px Arial'; ctx.textAlign = 'left';
    ctx.fillText(sfxEnabled ? '🔊' : '🔇', GW - 35, 32);
}

// ===== UI SCREENS =====

function drawMenu() {
    drawSky(); drawParallax(); drawClouds(); drawGround();

    ctx.fillStyle = '#00000033'; ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
    ctx.fillText('MONKEY', GW / 2 + 2, 162);
    ctx.fillText('SWING', GW / 2 + 2, 212);
    ctx.fillStyle = '#FFD600'; ctx.fillText('MONKEY', GW / 2, 160);
    ctx.fillStyle = '#4CAF50'; ctx.fillText('SWING', GW / 2, 210);

    const om = { ...mk }; Object.assign(mk, { x: GW / 2 - 30, y: 260, vel: 0 });
    drawMonkey(); Object.assign(mk, om);
    drawBanana(GW / 2 + 45, 280, 18);

    // Play button
    ctx.fillStyle = '#388E3C'; ctx.beginPath(); ctx.roundRect(GW / 2 - 80, 373, 160, 52, 12); ctx.fill();
    ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.roundRect(GW / 2 - 80, 370, 160, 50, 12); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 22px Arial'; ctx.fillText('CHƠI NGAY', GW / 2, 402);

    // Shop button
    ctx.fillStyle = '#E65100'; ctx.beginPath(); ctx.roundRect(GW / 2 - 80, 438, 160, 42, 10); ctx.fill();
    ctx.fillStyle = '#FF9800'; ctx.beginPath(); ctx.roundRect(GW / 2 - 80, 436, 160, 40, 10); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 18px Arial'; ctx.fillText('🐒 CỬA HÀNG', GW / 2, 462);

    ctx.fillStyle = '#FFF'; ctx.font = '16px Arial';
    ctx.fillText(`🏆 ${highScore}  🍌 ${totalBananas}`, GW / 2, 510);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '13px Arial';
    ctx.fillText('Chạm để chơi | Space/↑', GW / 2, 540);
}

function drawShop() {
    drawSky(); drawGround();
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, GW, GH);

    ctx.fillStyle = '#FFF'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
    ctx.fillText('CỬA HÀNG', GW / 2, 50);
    ctx.font = '16px Arial'; ctx.fillStyle = '#FFD600';
    ctx.fillText(`🍌 ${totalBananas}`, GW / 2, 75);

    const startY = 100 - shopScroll;
    skins.forEach((s, i) => {
        const sy = startY + i * 100;
        if (sy < 60 || sy > GH - 80) return;

        const owned = unlockedSkins.includes(s.id);
        const selected = currentSkin === s.id;

        // Card
        ctx.fillStyle = selected ? '#E8F5E9' : '#FFF';
        ctx.beginPath(); ctx.roundRect(30, sy, GW - 60, 85, 10); ctx.fill();
        if (selected) { ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 2; ctx.stroke(); }

        // Mini monkey preview
        ctx.save();
        ctx.translate(75, sy + 42);
        ctx.scale(0.8, 0.8);
        ctx.fillStyle = s.body;
        ctx.beginPath(); ctx.ellipse(0, 3, 14, 16, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = s.belly;
        ctx.beginPath(); ctx.ellipse(2, 5, 8, 10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = s.body;
        ctx.beginPath(); ctx.ellipse(4, -8, 12, 11, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.arc(2, -10, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(8, -10, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // Name + cost
        ctx.fillStyle = '#333'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'left';
        ctx.fillText(s.name, 120, sy + 35);

        if (!owned) {
            ctx.fillStyle = '#FF9800'; ctx.font = '14px Arial';
            ctx.fillText(`🍌 ${s.cost}`, 120, sy + 58);
            // Buy button
            const canBuy = totalBananas >= s.cost;
            ctx.fillStyle = canBuy ? '#4CAF50' : '#BDBDBD';
            ctx.beginPath(); ctx.roundRect(GW - 115, sy + 30, 70, 30, 6); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
            ctx.fillText('MUA', GW - 80, sy + 50);
        } else if (selected) {
            ctx.fillStyle = '#4CAF50'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
            ctx.fillText('✓ Đang dùng', GW - 80, sy + 50);
        } else {
            ctx.fillStyle = '#2196F3';
            ctx.beginPath(); ctx.roundRect(GW - 115, sy + 30, 70, 30, 6); ctx.fill();
            ctx.fillStyle = '#FFF'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center';
            ctx.fillText('CHỌN', GW - 80, sy + 50);
        }
    });

    // Back button
    ctx.fillStyle = '#F44336';
    ctx.beginPath(); ctx.roundRect(GW / 2 - 50, GH - 70, 100, 36, 8); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
    ctx.fillText('← QUAY LẠI', GW / 2, GH - 46);
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.roundRect(GW / 2 - 130, 160, 260, 350, 16); ctx.fill();

    ctx.fillStyle = '#F44336'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', GW / 2, 205);

    ctx.fillStyle = '#F5F5F5'; ctx.beginPath(); ctx.roundRect(GW / 2 - 110, 220, 220, 90, 10); ctx.fill();
    ctx.fillStyle = '#666'; ctx.font = '14px Arial'; ctx.fillText('Điểm', GW / 2, 245);
    ctx.fillStyle = '#FF9800'; ctx.font = 'bold 36px Arial'; ctx.fillText(score, GW / 2, 285);

    ctx.fillStyle = '#666'; ctx.font = '14px Arial'; ctx.fillText('Kỷ lục', GW / 2, 335);
    ctx.fillStyle = '#4CAF50'; ctx.font = 'bold 22px Arial'; ctx.fillText(highScore, GW / 2, 362);

    ctx.fillStyle = '#FFD600'; ctx.font = '14px Arial'; ctx.fillText(`🍌 +${bananaCount}`, GW / 2, 390);
    ctx.fillStyle = '#999'; ctx.font = '12px Arial'; ctx.fillText(`Tổng: ${totalBananas}`, GW / 2, 408);

    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#F44336'; ctx.font = 'bold 14px Arial';
        ctx.fillText('🎉 KỶ LỤC MỚI! 🎉', GW / 2, 430);
    }

    // Retry
    ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.roundRect(GW / 2 - 60, 440, 120, 36, 8); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 16px Arial'; ctx.fillText('CHƠI LẠI', GW / 2, 464);

    // Share
    ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.roundRect(GW / 2 - 60, 485, 120, 32, 8); ctx.fill();
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 14px Arial'; ctx.fillText('📤 CHIA SẺ', GW / 2, 506);
}

// ===== GAME LOGIC =====

function spawn() {
    const th = Math.floor(Math.random() * (GH - 60 - currentGap - 160)) + 80;
    const by = th + currentGap;
    obs.push({ x: GW, th, by, scored: false });

    // Power-up or banana
    const rand = Math.random();
    if (rand < 0.05 && score > 5) {
        powerups.push({ x: GW + OW / 2, y: th + currentGap / 2, type: 'golden' });
    } else if (rand < 0.08 && score > 10) {
        powerups.push({ x: GW + OW / 2, y: th + currentGap / 2, type: 'magnet' });
    } else {
        bans.push({ x: GW + OW / 2, y: th + currentGap / 2, s: 18, col: false });
    }
}

function spawnEnemy() {
    const types = currentThemeIdx >= 2 ? ['bee', 'bat', 'snake'] : ['bee', 'snake'];
    const type = types[Math.floor(Math.random() * types.length)];
    const y = 100 + Math.random() * (GH - 250);
    enemies.push({ type, x: GW + 30, y, baseY: y, vx: speed * 1.2 + 1, w: 25, h: 15, frame: 0 });
}

function spawnP(x, y, c, n, type) {
    for (let i = 0; i < Math.min(n, 50 - parts.length); i++)
        parts.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: Math.random() * 4 + 2, life: 1, color: c, type: type || 'circle' });
}

function checkCol() {
    if (activePower.type === 'golden') return false;
    const px = mk.x + 5, py = mk.y + 5, pw = mk.w - 10, ph = mk.h - 10;
    if (py + ph >= GH - 60 || py <= 0) return true;
    for (const o of obs)
        if (px + pw > o.x && px < o.x + OW && (py < o.th || py + ph > o.by)) return true;
    for (const e of enemies) {
        const ex = e.x - e.w, ey = e.y - e.h;
        if (px + pw > ex && px < ex + e.w * 2 && py + ph > ey && py < ey + e.h * 2) return true;
    }
    return false;
}

function checkBan() {
    bans.forEach(b => {
        if (b.col) return;
        const dx = (mk.x + mk.w / 2) - b.x, dy = (mk.y + mk.h / 2) - b.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
            b.col = true;
            combo++; comboTimer = 90;
            comboMultiplier = Math.min(Math.floor(combo / 3) + 1, 5);
            bananaCount += comboMultiplier;
            sfxCollect(comboMultiplier - 1);
            spawnP(b.x, b.y, '#FFD600', 8, comboMultiplier > 1 ? 'star' : 'circle');
            if (comboMultiplier > 1) {
                floatTexts.push({ x: b.x, y: b.y, text: `x${comboMultiplier}!`, color: '#FF5722', size: 20, life: 1 });
            }
        }
    });
    // Power-ups
    powerups.forEach((p, i) => {
        const dx = (mk.x + mk.w / 2) - p.x, dy = (mk.y + mk.h / 2) - p.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
            activePower = { type: p.type, timer: p.type === 'golden' ? 180 : 300 };
            powerups.splice(i, 1);
            sfxPowerUp();
            spawnP(p.x, p.y, p.type === 'golden' ? '#FFD700' : '#2196F3', 12, 'star');
            floatTexts.push({ x: p.x, y: p.y, text: p.type === 'golden' ? '⭐ BẤT TỬ!' : '🧲 NAM CHÂM!', color: '#FFF', size: 16, life: 1.5 });
        }
    });
}

function reset() {
    mk.y = GH / 2; mk.vel = 0; mk.rot = 0;
    obs = []; bans = []; enemies = []; powerups = []; parts = []; floatTexts = [];
    activePower = { type: null, timer: 0 };
    score = 0; bananaCount = 0; speed = SPD; oTimer = 0; enemyTimer = 0;
    frameCount = 0; combo = 0; comboTimer = 0; comboMultiplier = 1;
    currentGap = 160; currentInterval = 100;
    currentThemeIdx = 0;
}

function jump() {
    initAudio();
    if (gameState === 'menu') { gameState = 'playing'; reset(); startBGM(); return; }
    if (gameState === 'playing') { mk.vel = mk.jmp; sfxJump(); spawnP(mk.x, mk.y + mk.h, 'rgba(255,255,255,0.5)', 3); }
    if (gameState === 'gameover') { gameState = 'menu'; }
}

function shareScore() {
    const text = `🐒🍌 Monkey Swing - Tôi đạt ${score} điểm! Bạn có đánh bại được không?\nhttps://tienlam90tb.github.io/monkey-swing/`;
    if (navigator.share) {
        navigator.share({ title: 'Monkey Swing', text });
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text);
        floatTexts.push({ x: GW / 2, y: GH / 2, text: 'Đã copy!', color: '#4CAF50', size: 20, life: 1.5 });
    }
}

// ===== UPDATE =====

function update() {
    if (gameState !== 'playing') return;
    frameCount++;

    mk.vel += mk.grav; mk.y += mk.vel;

    // Difficulty
    speed = SPD + Math.floor(score / 5) * 0.25;
    speed = Math.min(speed, 8);
    currentGap = Math.max(120, 160 - score * 0.5);
    currentInterval = Math.max(65, 100 - score * 0.5);

    // Theme
    for (let i = themes.length - 1; i >= 0; i--) {
        if (score >= themes[i].minScore) { currentThemeIdx = i; break; }
    }

    // Combo timer
    if (comboTimer > 0) { comboTimer--; } else { combo = 0; comboMultiplier = 1; }

    // Power-up timer
    if (activePower.timer > 0) {
        activePower.timer--;
        if (activePower.timer <= 0) activePower = { type: null, timer: 0 };
    }

    // Magnet effect
    if (activePower.type === 'magnet') {
        bans.forEach(b => {
            if (b.col) return;
            const dx = (mk.x + mk.w / 2) - b.x, dy = (mk.y + mk.h / 2) - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) { b.x += dx * 0.08; b.y += dy * 0.08; }
        });
    }

    // Obstacles
    oTimer++;
    if (oTimer >= currentInterval) { spawn(); oTimer = 0; }
    obs.forEach(o => { o.x -= speed; if (!o.scored && o.x + OW < mk.x) { o.scored = true; score++; } });
    obs = obs.filter(o => o.x > -OW);

    // Bananas & power-ups
    bans.forEach(b => b.x -= speed);
    bans = bans.filter(b => b.x > -30);
    powerups.forEach(p => p.x -= speed);
    powerups = powerups.filter(p => p.x > -30);

    // Enemies
    enemyTimer++;
    if (enemyTimer >= Math.max(80, 180 - score * 2) && score > 3) { spawnEnemy(); enemyTimer = 0; }
    enemies.forEach(e => {
        e.x -= e.vx;
        e.frame++;
        if (e.type === 'bee') e.y = e.baseY + Math.sin(e.frame * 0.05) * 30;
        if (e.type === 'bat') e.y = e.baseY + Math.sin(e.frame * 0.08) * 40 + Math.cos(e.frame * 0.03) * 20;
    });
    enemies = enemies.filter(e => e.x > -50);

    // Clouds
    clouds.forEach(c => { c.x -= c.s; if (c.x < -c.w) c.x = GW + c.w; });
    gX += speed;

    checkBan();
    if (checkCol()) {
        gameState = 'gameover';
        sfxHit(); stopBGM();
        totalBananas += bananaCount;
        localStorage.setItem('msTB', totalBananas + '');
        if (score > highScore) { highScore = score; localStorage.setItem('msHS', highScore + ''); }
        spawnP(mk.x + mk.w / 2, mk.y + mk.h / 2, '#F44336', 15);
    }
}

// ===== RENDER =====

function render() {
    ctx.clearRect(0, 0, GW, GH);
    if (gameState === 'menu') { drawMenu(); return; }
    if (gameState === 'shop') { drawShop(); return; }

    drawSky(); drawParallax(); drawClouds();
    obs.forEach(o => drawTree(o.x, o.th, o.by));
    bans.forEach(b => { if (!b.col) drawBanana(b.x, b.y, b.s); });
    powerups.forEach(p => drawPowerUpItem(p));
    enemies.forEach(e => drawEnemy(e));
    drawGround(); drawMonkey(); drawParts(); drawFloatTexts(); drawScore();
    if (gameState === 'gameover') drawGameOver();
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ===== INPUT =====

function handleTap(tx, ty) {
    initAudio();
    // Scale tap coords
    const rect = canvas.getBoundingClientRect();
    const x = (tx - rect.left) * GW / rect.width;
    const y = (ty - rect.top) * GH / rect.height;

    if (gameState === 'menu') {
        if (y > 370 && y < 420 && x > GW / 2 - 80 && x < GW / 2 + 80) { jump(); return; }
        if (y > 436 && y < 476 && x > GW / 2 - 80 && x < GW / 2 + 80) { gameState = 'shop'; shopScroll = 0; return; }
        jump();
    } else if (gameState === 'shop') {
        // Back button
        if (y > GH - 70 && y < GH - 34) { gameState = 'menu'; return; }
        // Skin buttons
        const startY = 100 - shopScroll;
        skins.forEach((s, i) => {
            const sy = startY + i * 100;
            if (x > GW - 115 && x < GW - 45 && y > sy + 30 && y < sy + 60) {
                const owned = unlockedSkins.includes(s.id);
                if (!owned && totalBananas >= s.cost) {
                    totalBananas -= s.cost;
                    unlockedSkins.push(s.id);
                    currentSkin = s.id;
                    localStorage.setItem('msTB', totalBananas + '');
                    localStorage.setItem('msSkins', JSON.stringify(unlockedSkins));
                    localStorage.setItem('msCSkin', currentSkin);
                } else if (owned) {
                    currentSkin = s.id;
                    localStorage.setItem('msCSkin', currentSkin);
                }
            }
        });
    } else if (gameState === 'playing') {
        // Sound toggle
        if (x > GW - 45 && y < 45) { sfxEnabled = !sfxEnabled; return; }
        jump();
    } else if (gameState === 'gameover') {
        if (y > 440 && y < 476) { jump(); return; }
        if (y > 485 && y < 517) { shareScore(); return; }
        if (y > 520) jump();
    }
}

canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleTap(e.clientX, e.clientY); });
document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    if (e.code === 'KeyM') { musicEnabled = !musicEnabled; musicEnabled ? startBGM() : stopBGM(); }
});

// Touch scroll in shop
let touchStartY = 0;
canvas.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchmove', e => {
    if (gameState === 'shop') {
        shopScroll += touchStartY - e.touches[0].clientY;
        shopScroll = Math.max(0, Math.min(shopScroll, skins.length * 100 - 400));
        touchStartY = e.touches[0].clientY;
    }
}, { passive: true });

// Resize
function resize() {
    const r = Math.min(window.innerWidth / GW, window.innerHeight / GH);
    canvas.style.width = GW * r + 'px'; canvas.style.height = GH * r + 'px';
}
window.addEventListener('resize', resize); resize();

loop();
</script>
