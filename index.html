let audioCtx = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function sfxJump() {
    if (!audioCtx || !sfxEnabled) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(300, audioCtx.currentTime);
    o.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
    o.start(); o.stop(audioCtx.currentTime + 0.12);
}

function sfxCollect(pitch) {
    if (!audioCtx || !sfxEnabled) return;
    const base = 800 + (pitch || 0) * 100;
    [0, 0.06].forEach((t, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = base + i * 400;
        g.gain.setValueAtTime(0.12, audioCtx.currentTime + t);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + t + 0.08);
        o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + 0.08);
    });
}

function sfxHit() {
    if (!audioCtx || !sfxEnabled) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.2, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const s = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    s.buffer = buf; s.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.2, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
    s.start();
}

function sfxPowerUp() {
    if (!audioCtx || !sfxEnabled) return;
    [400, 600, 800, 1000].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.value = f;
        const t = audioCtx.currentTime + i * 0.06;
        g.gain.setValueAtTime(0.1, t);
        g.gain.linearRampToValueAtTime(0, t + 0.08);
        o.start(t); o.stop(t + 0.08);
    });
}

function startBGM() {
    if (!audioCtx || !musicEnabled) return;
    stopBGM();
    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = 0.04;
    bgmGain.connect(audioCtx.destination);
    const notes = [262, 294, 330, 392, 440, 392, 330, 294];
    const playLoop = () => {
        notes.forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.type = 'square';
            o.frequency.value = f / 2;
            const t = audioCtx.currentTime + i * 0.25;
            g.gain.setValueAtTime(0.5, t);
            g.gain.linearRampToValueAtTime(0, t + 0.2);
            o.start(t); o.stop(t + 0.25);
        });
    };
    playLoop();
    bgmOsc1 = setInterval(playLoop, notes.length * 250);
}

function stopBGM() {
    if (bgmOsc1) { clearInterval(bgmOsc1); bgmOsc1 = null; }

// ===== UTILITY DRAWING HELPERS =====

function lerpColor(a, b, t) {
    const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
    const ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
    const br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const bl = Math.round(ab + (bb - ab) * t);
    return `#${((1 << 24) + (r << 16) + (g << 8) + bl).toString(16).slice(1)}`;
}

function hexToRgb(hex) {
    const h = parseInt(hex.slice(1), 16);
    return { r: (h >> 16) & 255, g: (h >> 8) & 255, b: h & 255 };
}

function drawRoundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawTextOutline(text, x, y, fillColor, outColor, font) {
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.strokeStyle = outColor;
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.strokeText(text, x, y);
    ctx.fillStyle = fillColor;
    ctx.fillText(text, x, y);
}

// ===== VIGNETTE EFFECT =====
function drawVignette() {
    const grad = ctx.createRadialGradient(GW / 2, GH / 2, GH * 0.3, GW / 2, GH / 2, GH * 0.75);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);
}

// ===== DRAWING FUNCTIONS =====

function drawSky() {
    const T = getTheme();
    let sky1 = T.sky1, sky2 = T.sky2;
    // Theme transition fade
    if (themeTransition > 0) {
        const pT = themes[prevThemeIdx];
        const t = 1 - themeTransition / 60;
        sky1 = lerpColor(pT.sky1, T.sky1, t);
        sky2 = lerpColor(pT.sky2, T.sky2, t);
    }
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, sky1);
    grad.addColorStop(1, sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    // Sun/moon with rays
    drawCelestial();

    // Stars for space theme
    if (currentThemeIdx === 3) {
        stars.forEach(s => {
            const bright = 0.3 + Math.sin(frameCount * s.twinkleSpeed + s.b * 10) * 0.5;
            ctx.fillStyle = `rgba(255,255,255,${Math.max(0, bright)})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
            ctx.fill();
            // Cross sparkle on brighter stars
            if (s.s > 1.5 && bright > 0.5) {
                ctx.strokeStyle = `rgba(255,255,255,${bright * 0.4})`;
                ctx.lineWidth = 0.5;
                const cr = s.s * 3;
                ctx.beginPath();
                ctx.moveTo(s.x - cr, s.y); ctx.lineTo(s.x + cr, s.y);
                ctx.moveTo(s.x, s.y - cr); ctx.lineTo(s.x, s.y + cr);
                ctx.stroke();
            }
        });
        // Nebula effect
        drawNebula();
    }
}

function drawNebula() {
    const nebulas = [
        { x: 100, y: 150, r: 80, color: '120,60,200' },
        { x: 300, y: 100, r: 60, color: '200,50,100' },
        { x: 200, y: 400, r: 70, color: '50,80,180' },
    ];
    nebulas.forEach(n => {
        const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        grad.addColorStop(0, `rgba(${n.color},0.08)`);
        grad.addColorStop(0.5, `rgba(${n.color},0.04)`);
        grad.addColorStop(1, `rgba(${n.color},0)`);
        ctx.fillStyle = grad;
        ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2);
    });
}

function drawCelestial() {
    const T = getTheme();
    const sunX = 320, sunY = 80;
    const pulse = Math.sin(frameCount * 0.02) * 5;

    if (currentThemeIdx === 3) {
        // Moon in space
        ctx.fillStyle = '#E8EAF6';
        ctx.beginPath(); ctx.arc(sunX, sunY, 25, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#C5CAE9';
        ctx.beginPath(); ctx.arc(sunX - 5, sunY - 3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sunX + 8, sunY + 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sunX + 2, sunY + 10, 2, 0, Math.PI * 2); ctx.fill();
        // Moon glow
        const mGrad = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 60 + pulse);
        mGrad.addColorStop(0, 'rgba(200,200,255,0.15)');
        mGrad.addColorStop(1, 'rgba(200,200,255,0)');
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(sunX, sunY, 60 + pulse, 0, Math.PI * 2); ctx.fill();
    } else {
        // Sun
        const rgb = hexToRgb(T.sunColor);
        // Sun rays
        ctx.save();
        ctx.translate(sunX, sunY);
        ctx.rotate(frameCount * 0.005);
        for (let i = 0; i < 12; i++) {
            ctx.rotate(Math.PI / 6);
            ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.12)`;
            ctx.beginPath();
            ctx.moveTo(-3, 0);
            ctx.lineTo(0, -45 - pulse);
            ctx.lineTo(3, 0);
            ctx.fill();
        }
        ctx.restore();
        // Sun glow
        const sGrad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 50 + pulse);
        sGrad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`);
        sGrad.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},0.1)`);
        sGrad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
        ctx.fillStyle = sGrad;
        ctx.beginPath(); ctx.arc(sunX, sunY, 50 + pulse, 0, Math.PI * 2); ctx.fill();
        // Sun body
        ctx.fillStyle = T.sunColor;
        ctx.beginPath(); ctx.arc(sunX, sunY, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFFFFF44';
        ctx.beginPath(); ctx.arc(sunX - 5, sunY - 5, 8, 0, Math.PI * 2); ctx.fill();
    }
}

function drawParallax() {
    const T = getTheme();
    T.bgLayers.forEach(layer => {
        const offset = (gX * layer.speed) % GW;
        if (layer.shapes === 'mountains') {
            // Mountain silhouettes with gradient
            for (let i = -1; i < GW / 80 + 2; i++) {
                const bx = i * 80 - offset % 80;
                const peakY = layer.y - 30 - (i % 3) * 20 - (i % 5) * 8;
                const grad = ctx.createLinearGradient(bx, peakY, bx, layer.y + 40);
                const rgb = hexToRgb(layer.color);
                grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.9)`);
                grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.moveTo(bx, layer.y + 40);
                ctx.lineTo(bx + 20, peakY + 15);
                ctx.lineTo(bx + 40, peakY);
                ctx.lineTo(bx + 55, peakY + 20);
                ctx.lineTo(bx + 80, layer.y + 40);
                ctx.fill();
                // Snow cap for volcano/jungle
                if (currentThemeIdx === 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.moveTo(bx + 35, peakY + 3);
                    ctx.lineTo(bx + 40, peakY);
                    ctx.lineTo(bx + 45, peakY + 5);
                    ctx.fill();
                }
            }
        } else if (layer.shapes === 'trees') {
            // Tree canopy silhouettes
            for (let i = -1; i < GW / 50 + 2; i++) {
                const bx = i * 50 - offset % 50;
                const th = 25 + (i % 3) * 12;
                const rgb = hexToRgb(layer.color);
                ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`;
                // Tree trunk
                ctx.fillRect(bx + 22, layer.y - th + 20, 6, th);
                // Canopy as overlapping circles
                ctx.beginPath();
                ctx.arc(bx + 25, layer.y - th + 10, 18 + (i % 2) * 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx + 15, layer.y - th + 18, 14, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(bx + 35, layer.y - th + 16, 13, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (layer.shapes === 'waves') {
            ctx.beginPath();
            ctx.moveTo(0, layer.y + 20);
            for (let x = 0; x <= GW; x += 3) {
                const wave = Math.sin((x + offset * 3) * 0.03) * 10 + Math.sin((x + offset * 2) * 0.07) * 4;
                ctx.lineTo(x, layer.y + wave);
            }
            ctx.lineTo(GW, GH); ctx.lineTo(0, GH);
            const rgb = hexToRgb(layer.color);
            const grad = ctx.createLinearGradient(0, layer.y - 10, 0, GH);
            grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.7)`);
            grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`);
            ctx.fillStyle = grad;
            ctx.fill();
            // Caustic light effects for ocean
            if (currentThemeIdx === 1) {
                for (let cx = 0; cx < GW; cx += 40) {
                    const cy = layer.y + 30 + Math.sin(cx * 0.05 + frameCount * 0.03) * 15;
                    ctx.fillStyle = `rgba(255,255,255,${0.03 + Math.sin(frameCount * 0.05 + cx) * 0.02})`;
                    ctx.beginPath();
                    ctx.ellipse(cx + offset % 40, cy, 20, 10, Math.sin(frameCount * 0.01 + cx) * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        } else if (layer.shapes === 'lava') {
            const brightness = 100 + Math.sin(frameCount * 0.05) * 50;
            ctx.beginPath();
            ctx.moveTo(0, layer.y + 20);
            for (let x = 0; x <= GW; x += 3) {
                const lava = Math.sin((x + offset * 5) * 0.04) * 8 + Math.sin((x + offset * 3) * 0.08) * 4;
                ctx.lineTo(x, layer.y + lava);
            }
            ctx.lineTo(GW, GH); ctx.lineTo(0, GH);
            const lGrad = ctx.createLinearGradient(0, layer.y, 0, layer.y + 60);
            lGrad.addColorStop(0, `rgba(255,${Math.floor(brightness)},0,0.8)`);
            lGrad.addColorStop(0.5, `rgba(255,${Math.floor(brightness * 0.5)},0,0.5)`);
            lGrad.addColorStop(1, `rgba(180,20,0,0.3)`);
            ctx.fillStyle = lGrad;
            ctx.fill();
            // Heat shimmer
            if (currentThemeIdx === 2) {
                for (let hx = 0; hx < GW; hx += 30) {
                    const hy = layer.y - 20 + Math.sin(frameCount * 0.08 + hx * 0.1) * 5;
                    ctx.fillStyle = `rgba(255,150,0,${0.04 + Math.sin(frameCount * 0.1 + hx) * 0.02})`;
                    ctx.beginPath();
                    ctx.ellipse(hx, hy, 15, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        } else if (layer.shapes === 'stars') {
            // handled in drawSky
        }
    });
}

function drawClouds() {
    if (currentThemeIdx === 3) return;
    clouds.forEach(c => {
        // Cloud shadow
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.beginPath(); ctx.ellipse(c.x + 3, c.y + 3, c.w / 2, 20, 0, 0, Math.PI * 2); ctx.fill();
        // Cloud body with gradient
        const cGrad = ctx.createRadialGradient(c.x, c.y - 5, 0, c.x, c.y, c.w / 2);
        cGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
        cGrad.addColorStop(1, 'rgba(255,255,255,0.3)');
        ctx.fillStyle = cGrad;
        ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, 20, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.beginPath(); ctx.ellipse(c.x - c.w / 4, c.y - 10, c.w / 3, 15, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x + c.w / 4, c.y - 5, c.w / 3, 18, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x + c.w / 5, c.y - 12, c.w / 4, 12, 0, 0, Math.PI * 2); ctx.fill();
    });
}

function drawAmbientParticles() {
    const T = getTheme();
    ambientParts.forEach(p => {
        p.x += p.vx + Math.sin(frameCount * 0.01 + p.y * 0.01) * 0.3;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        if (p.y < -10) { p.y = GH + 10; p.x = Math.random() * GW; }
        if (p.x < -10) p.x = GW + 10;
        if (p.x > GW + 10) p.x = -10;

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = p.alpha * (0.5 + Math.sin(frameCount * 0.02 + p.x) * 0.3);

        if (T.particleType === 'leaves') {
            // Leaf shape
            ctx.fillStyle = Math.random() > 0.5 ? '#66BB6A' : '#43A047';
            ctx.beginPath();
            ctx.ellipse(0, 0, p.size, p.size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            // Leaf vein
            ctx.strokeStyle = 'rgba(0,80,0,0.3)';
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(-p.size, 0); ctx.lineTo(p.size, 0); ctx.stroke();
        } else if (T.particleType === 'bubbles') {
            ctx.strokeStyle = 'rgba(200,230,255,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath(); ctx.arc(-p.size * 0.3, -p.size * 0.3, p.size * 0.3, 0, Math.PI * 2); ctx.fill();
            p.vy = -Math.abs(p.vy); // bubbles go up
        } else if (T.particleType === 'embers') {
            const emberBright = 0.5 + Math.sin(frameCount * 0.1 + p.x) * 0.5;
            ctx.fillStyle = `rgba(255,${Math.floor(100 + emberBright * 100)},0,${emberBright * 0.8})`;
            ctx.beginPath(); ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2); ctx.fill();
            // Glow
            ctx.fillStyle = `rgba(255,100,0,${emberBright * 0.2})`;
            ctx.beginPath(); ctx.arc(0, 0, p.size * 1.5, 0, Math.PI * 2); ctx.fill();
            p.vy = -Math.abs(p.vy) * 1.2; // embers rise faster
        } else if (T.particleType === 'stars_float') {
            // Firefly-like stars
            const bright = 0.3 + Math.sin(frameCount * 0.03 + p.x * 0.1 + p.y * 0.1) * 0.7;
            ctx.fillStyle = `rgba(200,180,255,${bright})`;
            ctx.beginPath(); ctx.arc(0, 0, p.size * 0.4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `rgba(180,150,255,${bright * 0.3})`;
            ctx.beginPath(); ctx.arc(0, 0, p.size * 1.2, 0, Math.PI * 2); ctx.fill();
        }

        ctx.globalAlpha = 1;
        ctx.restore();
    });
}

function drawGround() {
    const T = getTheme();
    const groundY = GH - 60;

    // Dirt layers
    const dGrad = ctx.createLinearGradient(0, groundY, 0, GH);
    dGrad.addColorStop(0, T.ground);
    dGrad.addColorStop(0.3, T.groundDark);
    dGrad.addColorStop(1, T.groundLine);
    ctx.fillStyle = dGrad;
    ctx.fillRect(0, groundY, GW, 60);

    // Dirt texture dots
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let dx = 0; dx < GW; dx += 12) {
        for (let dy = groundY + 15; dy < GH; dy += 10) {
            const ox = Math.sin(dx * 0.5 + dy * 0.3) * 3;
            ctx.beginPath(); ctx.arc(dx + ox, dy, 1.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    // Top soil line
    ctx.fillStyle = T.groundLine;
    ctx.fillRect(0, groundY, GW, 3);

    // Waving grass blades
    for (let i = 0; i < GW + 20; i += 6) {
        const gx = ((i - gX * 0.5) % (GW + 20) + GW + 20) % (GW + 20) - 10;
        const wave = Math.sin(frameCount * 0.05 + i * 0.3) * 3;
        const h = 8 + (i % 3) * 3;
        const green = currentThemeIdx === 0 ? '#43A047' : currentThemeIdx === 1 ? '#00796B' : currentThemeIdx === 2 ? '#BF360C' : '#3F51B5';
        ctx.strokeStyle = green;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(gx, groundY);
        ctx.quadraticCurveTo(gx + wave, groundY - h / 2, gx + wave * 1.5, groundY - h);
        ctx.stroke();
    }

    // Flowers and mushrooms
    groundDecos.forEach(d => {
        const dx = ((d.x - gX * 0.3) % (GW * 2) + GW * 2) % (GW * 2) - GW * 0.5;
        if (dx < -20 || dx > GW + 20) return;
        if (d.type === 'flower') {
            const sway = Math.sin(frameCount * 0.04 + d.x) * 2;
            // Stem
            ctx.strokeStyle = '#388E3C';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(dx, groundY);
            ctx.quadraticCurveTo(dx + sway, groundY - 8, dx + sway, groundY - 14);
            ctx.stroke();
            // Petals
            ctx.fillStyle = d.color;
            for (let p = 0; p < 5; p++) {
                const angle = (p / 5) * Math.PI * 2 + frameCount * 0.01;
                ctx.beginPath();
                ctx.ellipse(
                    dx + sway + Math.cos(angle) * 3,
                    groundY - 14 + Math.sin(angle) * 3,
                    d.size * 0.6, d.size * 0.3, angle, 0, Math.PI * 2
                );
                ctx.fill();
            }
            // Center
            ctx.fillStyle = '#FFF176';
            ctx.beginPath(); ctx.arc(dx + sway, groundY - 14, 2, 0, Math.PI * 2); ctx.fill();
        } else {
            // Mushroom
            ctx.fillStyle = '#EFEBE9';
            ctx.fillRect(dx - 1.5, groundY - 6, 3, 6);
            ctx.fillStyle = d.color;
            ctx.beginPath();
            ctx.ellipse(dx, groundY - 7, d.size + 1, d.size * 0.6, 0, Math.PI, 0);
            ctx.fill();
            // Spots
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath(); ctx.arc(dx - 2, groundY - 9, 1, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(dx + 2, groundY - 8, 0.8, 0, Math.PI * 2); ctx.fill();
        }
    });
}

function drawTree(x, th, by) {
    const T = getTheme();

    // === Top obstacle (bamboo style) ===
    // 3D depth: darker left edge
    ctx.fillStyle = T.trunkDark;
    ctx.fillRect(x, 0, 8, th);
    // Main trunk
    const tGrad = ctx.createLinearGradient(x, 0, x + OW, 0);
    tGrad.addColorStop(0, T.trunkDark);
    tGrad.addColorStop(0.3, T.trunk);
    tGrad.addColorStop(0.7, T.trunk);
    tGrad.addColorStop(1, T.trunkDark);
    ctx.fillStyle = tGrad;
    ctx.fillRect(x + 4, 0, OW - 8, th);

    // Bamboo segments / nodes
    for (let t = 15; t < th; t += 22) {
        // Node ring
        ctx.fillStyle = T.trunkDark;
        ctx.fillRect(x + 2, t, OW - 4, 4);
        // Highlight on node
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(x + 10, t, OW - 25, 2);
        // Leaf sprouting from node
        if (t % 44 === 15) {
            const leafDir = (t % 88 === 15) ? 1 : -1;
            const leafSway = Math.sin(frameCount * 0.03 + t * 0.1) * 3;
            ctx.fillStyle = T.leaf;
            ctx.save();
            ctx.translate(x + (leafDir > 0 ? OW - 5 : 5), t + 2);
            ctx.rotate(leafDir * 0.3 + leafSway * 0.05);
            ctx.beginPath();
            ctx.ellipse(leafDir * 12, 0, 12, 5, leafDir * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Vine hanging from bottom of top obstacle
    ctx.strokeStyle = '#2E7D32';
    ctx.lineWidth = 2;
    const vineLen = 15 + Math.sin(frameCount * 0.02 + x) * 5;
    ctx.beginPath();
    ctx.moveTo(x + OW / 2 - 10, th);
    ctx.quadraticCurveTo(x + OW / 2 - 15, th + vineLen / 2, x + OW / 2 - 8, th + vineLen);
    ctx.stroke();
    // Vine leaf
    ctx.fillStyle = T.leafLight;
    ctx.beginPath();
    ctx.ellipse(x + OW / 2 - 8, th + vineLen, 4, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();

    // Top leaf cluster
    ctx.fillStyle = T.leaf;
    ctx.beginPath(); ctx.ellipse(x + OW / 2, th, OW / 2 + 12, 22, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = T.leafLight;
    ctx.beginPath(); ctx.ellipse(x + OW / 2 - 5, th - 6, OW / 2, 14, 0, 0, Math.PI * 2); ctx.fill();
    // Leaf highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.ellipse(x + OW / 2 - 8, th - 8, OW / 3, 8, -0.2, 0, Math.PI * 2); ctx.fill();

    // === Bottom obstacle ===
    ctx.fillStyle = T.trunkDark;
    ctx.fillRect(x, by, 8, GH - 60 - by);
    ctx.fillStyle = tGrad;
    ctx.fillRect(x + 4, by, OW - 8, GH - 60 - by);

    // Bamboo segments on bottom
    for (let t = by + 15; t < GH - 60; t += 22) {
        ctx.fillStyle = T.trunkDark;
        ctx.fillRect(x + 2, t, OW - 4, 4);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(x + 10, t, OW - 25, 2);
        // Leaf
        if (t % 44 === (by + 15) % 44) {
            const leafDir = (t % 88 === (by + 15) % 88) ? 1 : -1;
            const leafSway = Math.sin(frameCount * 0.03 + t * 0.1) * 3;
            ctx.fillStyle = T.leaf;
            ctx.save();
            ctx.translate(x + (leafDir > 0 ? OW - 5 : 5), t + 2);
            ctx.rotate(leafDir * 0.3 + leafSway * 0.05);
            ctx.beginPath();
            ctx.ellipse(leafDir * 12, 0, 12, 5, leafDir * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    // Moss/mushroom on bottom trunk
    const mossY = by + 20;
    if ((Math.floor(x * 7) % 3) === 0) {
        // Moss
        ctx.fillStyle = '#558B2F';
        ctx.beginPath();
        ctx.ellipse(x + 8, mossY, 6, 4, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#689F38';
        ctx.beginPath();
        ctx.ellipse(x + 12, mossY + 2, 5, 3, 0.1, 0, Math.PI * 2);
        ctx.fill();
    } else {
        // Small mushroom on trunk
        ctx.fillStyle = '#BCAAA4';
        ctx.beginPath();
        ctx.ellipse(x + 5, mossY, 5, 3, -0.5, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#8D6E63';
        ctx.fillRect(x + 3, mossY, 3, 4);
    }

    // Bottom leaf cluster
    ctx.fillStyle = T.leaf;
    ctx.beginPath(); ctx.ellipse(x + OW / 2, by, OW / 2 + 12, 22, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = T.leafLight;
    ctx.beginPath(); ctx.ellipse(x + OW / 2 + 5, by + 6, OW / 2, 14, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.ellipse(x + OW / 2 + 8, by + 8, OW / 3, 8, 0.2, 0, Math.PI * 2); ctx.fill();
}

function drawMonkey() {
    const S = getSkin();
    ctx.save();
    ctx.translate(mk.x + mk.w / 2, mk.y + mk.h / 2);
    mk.rot = Math.min(Math.max(mk.vel * 3, -30), 60);

    // Death animation spin
    if (deathAnim.active) {
        deathAnim.spin += 15;
        ctx.rotate(deathAnim.spin * Math.PI / 180);
    } else {
        ctx.rotate(mk.rot * Math.PI / 180);
    }

    const x = -mk.w / 2, y = -mk.h / 2;
    const tw = Math.sin(frameCount * 0.1) * 6;
    const isJumping = mk.vel < -2;
    const isFalling = mk.vel > 3;
    const armUp = isJumping ? -12 : isFalling ? 10 : 0;
    const aw = Math.sin(frameCount * 0.15) * 10 + armUp;

    // Blink logic
    blinkTimer++;
    if (blinkTimer > 180 + Math.random() * 60) { blinkState = true; blinkTimer = 0; }
    if (blinkState && blinkTimer > 6) blinkState = false;

    // Shadow underneath
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(3, mk.h / 2 + 5, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Power-up glow
    if (activePower.type === 'golden') {
        const gAlpha = 0.2 + Math.sin(frameCount * 0.1) * 0.15;
        const gGrad = ctx.createRadialGradient(0, 0, 5, 0, 0, 40);
        gGrad.addColorStop(0, `rgba(255,215,0,${gAlpha})`);
        gGrad.addColorStop(1, `rgba(255,215,0,0)`);
        ctx.fillStyle = gGrad;
        ctx.beginPath(); ctx.arc(0, 0, 40, 0, Math.PI * 2); ctx.fill();
    }
    if (activePower.type === 'magnet') {
        ctx.strokeStyle = `rgba(0,150,255,${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
        ctx.lineWidth = 2;
        const mr = 32 + Math.sin(frameCount * 0.2) * 5;
        ctx.beginPath(); ctx.arc(0, 0, mr, 0, Math.PI * 2); ctx.stroke();
        // Second ring
        ctx.strokeStyle = `rgba(0,100,255,${0.15 + Math.sin(frameCount * 0.15) * 0.1})`;
        ctx.beginPath(); ctx.arc(0, 0, mr + 8, 0, Math.PI * 2); ctx.stroke();
    }

    // Trail particles
    if (gameState === 'playing' && frameCount % 3 === 0) {
        parts.push({ x: mk.x + mk.w / 2, y: mk.y + mk.h / 2, vx: -1.5, vy: 0.5, size: 4, life: 0.5, color: S.body, type: 'circle' });
    }

    // Tail with physics-like wagging
    const tailWag1 = Math.sin(frameCount * 0.12) * 8;
    const tailWag2 = Math.sin(frameCount * 0.12 + 1) * 6;
    ctx.strokeStyle = S.dark; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x + 2, y + mk.h / 2);
    ctx.quadraticCurveTo(x - 12, y + mk.h / 2 + tailWag1, x - 18, y + 5 + tailWag1);
    ctx.stroke();
    ctx.strokeStyle = S.body; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x + 2, y + mk.h / 2);
    ctx.quadraticCurveTo(x - 11, y + mk.h / 2 + tailWag1, x - 17, y + 6 + tailWag1);
    ctx.stroke();
    // Tail tip curl
    ctx.strokeStyle = S.light; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(x - 17, y + 6 + tailWag1);
    ctx.quadraticCurveTo(x - 22, y - 5 + tailWag2, x - 16, y - 8 + tailWag2);
    ctx.stroke();

    // Body with fur texture
    ctx.fillStyle = S.body;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2, y + mk.h / 2 + 4, 19, 21, 0, 0, Math.PI * 2); ctx.fill();
    // Fur lines
    ctx.strokeStyle = S.dark;
    ctx.lineWidth = 0.8;
    for (let a = 0; a < Math.PI * 2; a += 0.4) {
        const fr = 19 + (a % 0.8 < 0.4 ? 2 : 0);
        const fx = x + mk.w / 2 + Math.cos(a) * fr;
        const fy = y + mk.h / 2 + 4 + Math.sin(a) * (fr + 2);
        const fl = 3 + Math.sin(a * 3) * 1.5;
        ctx.beginPath();
        ctx.moveTo(fx, fy);
        ctx.lineTo(fx + Math.cos(a) * fl, fy + Math.sin(a) * fl);
        ctx.stroke();
    }

    // Belly
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 2, y + mk.h / 2 + 6, 12, 14, 0, 0, Math.PI * 2); ctx.fill();

    // Head
    ctx.fillStyle = S.body;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 5, y + 14, 16, 15, 0, 0, Math.PI * 2); ctx.fill();
    // Head fur
    ctx.strokeStyle = S.dark;
    ctx.lineWidth = 0.6;
    for (let a = -Math.PI; a < 0; a += 0.5) {
        const hx = x + mk.w / 2 + 5 + Math.cos(a) * 16;
        const hy = y + 14 + Math.sin(a) * 15;
        ctx.beginPath();
        ctx.moveTo(hx, hy);
        ctx.lineTo(hx + Math.cos(a) * 3, hy + Math.sin(a) * 3);
        ctx.stroke();
    }
    // Face
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 8, y + 16, 11, 11, 0, 0, Math.PI * 2); ctx.fill();

    // Eyes
    if (!blinkState) {
        // Eye whites
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 3, y + 12, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 13, y + 12, 5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
        // Pupils (look in movement direction)
        const lookX = mk.vel < 0 ? 1 : mk.vel > 0 ? -0.5 : 0.5;
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 4 + lookX, y + 12, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 14 + lookX, y + 12, 3, 0, Math.PI * 2); ctx.fill();
        // Eye shine
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 5 + lookX, y + 10.5, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 15 + lookX, y + 10.5, 1.2, 0, Math.PI * 2); ctx.fill();
    } else {
        // Blink - closed eyes
        ctx.strokeStyle = '#212121'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + mk.w / 2, y + 12); ctx.lineTo(x + mk.w / 2 + 7, y + 12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + mk.w / 2 + 10, y + 12); ctx.lineTo(x + mk.w / 2 + 17, y + 12); ctx.stroke();
    }

    // Mouth
    if (isJumping) {
        // Open mouth when jumping
        ctx.fillStyle = '#5D4037';
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 10, y + 20, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 10, y + 21, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
    } else {
        // Smile when idle
        ctx.strokeStyle = S.dark; ctx.lineWidth = 1.8;
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 10, y + 18, 5, 0.1, Math.PI - 0.1); ctx.stroke();
        // Cheek blush
        ctx.fillStyle = 'rgba(255,150,150,0.25)';
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 1, y + 18, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 17, y + 17, 4, 2.5, 0, 0, Math.PI * 2); ctx.fill();
    }

    // Nose
    ctx.fillStyle = S.dark;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 9, y + 15, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 12, y + 15, 2, 1.5, 0, 0, Math.PI * 2); ctx.fill();

    // Ears
    ctx.fillStyle = S.light;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 - 7, y + 8, 6, 7, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 20, y + 8, 6, 7, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = S.ear;
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 - 7, y + 8, 4, 5, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w / 2 + 20, y + 8, 4, 5, 0.3, 0, Math.PI * 2); ctx.fill();

    // Arms with reach/flail
    const leftArmY = isJumping ? y + 5 : isFalling ? y + mk.h / 2 + 5 : y + mk.h / 2 - 5;
    const rightArmY = isJumping ? y + 3 : isFalling ? y + mk.h / 2 + 8 : y + mk.h / 2 - 8;
    const flailL = isFalling ? Math.sin(frameCount * 0.3) * 8 : 0;
    const flailR = isFalling ? Math.sin(frameCount * 0.3 + 1.5) * 8 : 0;

    ctx.strokeStyle = S.body; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x + 5, y + mk.h / 2);
    ctx.quadraticCurveTo(x - 3, leftArmY + aw * 0.5, x - 8 + flailL, leftArmY - 5 + aw);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + mk.w - 5, y + mk.h / 2);
    ctx.quadraticCurveTo(x + mk.w + 3, rightArmY - aw * 0.5, x + mk.w + 8 + flailR, rightArmY - 5 - aw);
    ctx.stroke();
    // Hands
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.arc(x - 8 + flailL, leftArmY - 5 + aw, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + mk.w + 8 + flailR, rightArmY - 5 - aw, 5, 0, Math.PI * 2); ctx.fill();

    // Legs
    const legWalk = Math.sin(frameCount * 0.15) * 4;
    ctx.strokeStyle = S.body; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x + 12, y + mk.h - 2);
    ctx.lineTo(x + 8, y + mk.h + 8 + legWalk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + mk.w - 12, y + mk.h - 2);
    ctx.lineTo(x + mk.w - 8, y + mk.h + 8 - legWalk); ctx.stroke();
    // Feet
    ctx.fillStyle = S.belly;
    ctx.beginPath(); ctx.ellipse(x + 6, y + mk.h + 9 + legWalk, 5, 3, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + mk.w - 6, y + mk.h + 9 - legWalk, 5, 3, 0.2, 0, Math.PI * 2); ctx.fill();

    // Accessories
    if (S.acc === 'headband') {
        ctx.fillStyle = '#F44336';
        ctx.fillRect(x + mk.w / 2 - 14, y + 3, 32, 5);
        // Headband tails
        const hbWave = Math.sin(frameCount * 0.1) * 3;
        ctx.strokeStyle = '#F44336'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + mk.w / 2 - 14, y + 5);
        ctx.quadraticCurveTo(x + mk.w / 2 - 22, y + 5 + hbWave, x + mk.w / 2 - 25, y + 10 + hbWave);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x + mk.w / 2 - 14, y + 7);
        ctx.quadraticCurveTo(x + mk.w / 2 - 20, y + 10 + hbWave * 0.8, x + mk.w / 2 - 22, y + 16 + hbWave);
        ctx.stroke();
    }
    if (S.acc === 'eyepatch') {
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 13, y + 12, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x + mk.w / 2 + 8, y + 9);
        ctx.lineTo(x + mk.w / 2 + 20, y + 5);
        ctx.lineTo(x + mk.w / 2 + 22, y + 8);
        ctx.stroke();
    }
    if (S.acc === 'helmet') {
        // Glass dome
        ctx.strokeStyle = '#B0BEC5'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 5, y + 12, 18, Math.PI, 0); ctx.stroke();
        ctx.fillStyle = 'rgba(100,200,255,0.2)';
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 5, y + 12, 17, Math.PI + 0.1, -0.1); ctx.fill();
        // Reflection
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x + mk.w / 2 + 1, y + 8, 10, Math.PI + 0.5, Math.PI + 1.5); ctx.stroke();
    }

    ctx.restore();
}

function drawBanana(bx, by, s) {
    ctx.save();
    ctx.translate(bx, by);

    // Glow effect
    const glowAlpha = 0.15 + Math.sin(frameCount * 0.08) * 0.1;
    const gGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 2);
    gGrad.addColorStop(0, `rgba(255,214,0,${glowAlpha})`);
    gGrad.addColorStop(1, 'rgba(255,214,0,0)');
    ctx.fillStyle = gGrad;
    ctx.beginPath(); ctx.arc(0, 0, s * 2, 0, Math.PI * 2); ctx.fill();

    // Sparkle particles around banana
    for (let sp = 0; sp < 3; sp++) {
        const sAngle = frameCount * 0.05 + sp * (Math.PI * 2 / 3);
        const sDist = s + 5 + Math.sin(frameCount * 0.1 + sp) * 3;
        const sx = Math.cos(sAngle) * sDist;
        const sy = Math.sin(sAngle) * sDist;
        const sAlpha = 0.4 + Math.sin(frameCount * 0.15 + sp * 2) * 0.4;
        ctx.fillStyle = `rgba(255,255,200,${sAlpha})`;
        drawStarShape(sx, sy, 4, 3, 1.5);
        ctx.fill();
    }

    ctx.rotate((frameCount * 0.06) % (Math.PI * 2));

    // 3 banana cluster
    for (let b = 0; b < 3; b++) {
        ctx.save();
        ctx.rotate((b - 1) * 0.4);
        ctx.translate((b - 1) * 3, 0);
        // Banana body
        const bGrad = ctx.createLinearGradient(-s / 2, -s, s / 2, s / 4);
        bGrad.addColorStop(0, '#FFE082');
        bGrad.addColorStop(0.5, '#FFD600');
        bGrad.addColorStop(1, '#F9A825');
        ctx.fillStyle = bGrad;
        ctx.beginPath(); ctx.moveTo(-s / 2.5, 0);
        ctx.quadraticCurveTo(-s / 2.5, -s * 0.8, 0, -s * 0.8);
        ctx.quadraticCurveTo(s / 2.5, -s * 0.8, s / 2.5, 0);
        ctx.quadraticCurveTo(s / 3.5, s / 4, 0, s / 5);
        ctx.quadraticCurveTo(-s / 3.5, s / 4, -s / 2.5, 0);
        ctx.fill();
        // Banana tip
        ctx.fillStyle = '#795548';
        ctx.beginPath(); ctx.arc(0, -s * 0.8 + 2, 2, 0, Math.PI * 2); ctx.fill();
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(-s / 6, -s * 0.4, s / 6, s / 3, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    ctx.restore();
}

function drawStarShape(cx, cy, spikes, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / spikes) - Math.PI / 2;
        if (i === 0) ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
        else ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    }
    ctx.closePath();
}

function drawPowerUpItem(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    const pulse = 1 + Math.sin(frameCount * 0.1) * 0.15;
    ctx.scale(pulse, pulse);
    if (p.type === 'golden') {
        // Golden banana with glow
        const gGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 25);
        gGrad.addColorStop(0, 'rgba(255,215,0,0.4)');
        gGrad.addColorStop(1, 'rgba(255,215,0,0)');
        ctx.fillStyle = gGrad;
        ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI * 2); ctx.fill();
        ctx.rotate((frameCount * 0.08) % (Math.PI * 2));
        const bGrad = ctx.createLinearGradient(-10, -20, 10, 5);
        bGrad.addColorStop(0, '#FFF176');
        bGrad.addColorStop(0.5, '#FFD700');
        bGrad.addColorStop(1, '#FF8F00');
        ctx.fillStyle = bGrad;
        ctx.beginPath(); ctx.moveTo(-10, 0);
        ctx.quadraticCurveTo(-10, -20, 0, -20);
        ctx.quadraticCurveTo(10, -20, 10, 0);
        ctx.quadraticCurveTo(7, 7, 0, 5);
        ctx.quadraticCurveTo(-7, 7, -10, 0);
        ctx.fill();
        // Star icon
        ctx.fillStyle = '#FFF';
        drawStarShape(0, -2, 5, 6, 3);
        ctx.fill();
    } else if (p.type === 'magnet') {
        // Magnet with glow
        const mGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 22);
        mGrad.addColorStop(0, 'rgba(33,150,243,0.3)');
        mGrad.addColorStop(1, 'rgba(33,150,243,0)');
        ctx.fillStyle = mGrad;
        ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.fill();
        // Magnet body
        ctx.fillStyle = '#F44336';
        ctx.beginPath(); ctx.arc(-6, 2, 9, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#2196F3';
        ctx.beginPath(); ctx.arc(6, 2, 9, Math.PI, 0); ctx.fill();
        ctx.fillStyle = '#9E9E9E';
        drawRoundRect(-4, -14, 8, 10, 2);
        ctx.fill();
        // Field lines
        ctx.strokeStyle = `rgba(100,180,255,${0.3 + Math.sin(frameCount * 0.1) * 0.2})`;
        ctx.lineWidth = 1;
        for (let fl = 0; fl < 3; fl++) {
            const flr = 14 + fl * 5 + Math.sin(frameCount * 0.08 + fl) * 2;
            ctx.beginPath();
            ctx.arc(0, 5, flr, Math.PI + 0.5, -0.5);
            ctx.stroke();
        }
    }
    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'bee') {
        // Pollen trail behind
        for (let t = 1; t <= 4; t++) {
            ctx.fillStyle = `rgba(255,235,59,${0.15 - t * 0.03})`;
            ctx.beginPath(); ctx.arc(t * 8, Math.sin(frameCount * 0.3 + t) * 3, 3 - t * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        // Body with gradient
        const bGrad = ctx.createLinearGradient(-12, 0, 12, 0);
        bGrad.addColorStop(0, '#FFC107');
        bGrad.addColorStop(0.5, '#FFD600');
        bGrad.addColorStop(1, '#FFB300');
        ctx.fillStyle = bGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2); ctx.fill();
        // Stripes
        ctx.fillStyle = '#212121';
        ctx.fillRect(-5, -10, 3, 20);
        ctx.fillRect(3, -10, 3, 20);
        // Fuzzy body outline
        ctx.strokeStyle = '#795548';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2); ctx.stroke();
        // Wing blur (animated)
        const wingPhase = frameCount * 0.6;
        const wingAlpha = 0.3 + Math.abs(Math.sin(wingPhase)) * 0.3;
        ctx.fillStyle = `rgba(200,230,255,${wingAlpha})`;
        // Left wing
        ctx.beginPath(); ctx.ellipse(-4, -12 + Math.sin(wingPhase) * 3, 10, 6, -0.3, 0, Math.PI * 2); ctx.fill();
        // Right wing
        ctx.beginPath(); ctx.ellipse(4, -12 + Math.sin(wingPhase + 0.5) * 3, 10, 6, 0.3, 0, Math.PI * 2); ctx.fill();
        // Wing blur (motion lines)
        ctx.strokeStyle = `rgba(200,230,255,${wingAlpha * 0.5})`;
        ctx.lineWidth = 1;
        for (let wl = 0; wl < 3; wl++) {
            const wy = -14 + wl * 2;
            ctx.beginPath(); ctx.moveTo(-14, wy); ctx.lineTo(-4, wy - 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(14, wy); ctx.lineTo(4, wy - 2); ctx.stroke();
        }
        // Eyes
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(8, -3, 4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(9, -3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#FFF';
        ctx.beginPath(); ctx.arc(9.5, -4, 0.8, 0, Math.PI * 2); ctx.fill();
        // Stinger
        ctx.fillStyle = '#212121';
        ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(-20, -2); ctx.lineTo(-20, 2); ctx.fill();
        // Antennae
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(6, -8); ctx.quadraticCurveTo(10, -18, 14, -16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(2, -8); ctx.quadraticCurveTo(-2, -18, -6, -16); ctx.stroke();
        ctx.fillStyle = '#FFD600';
        ctx.beginPath(); ctx.arc(14, -16, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-6, -16, 2, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'bat') {
        const wingFlap = Math.sin(frameCount * 0.35) * 18;
        // Body
        const batGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 12);
        batGrad.addColorStop(0, '#6A1B9A');
        batGrad.addColorStop(1, '#4A148C');
        ctx.fillStyle = batGrad;
        ctx.beginPath(); ctx.ellipse(0, 0, 10, 12, 0, 0, Math.PI * 2); ctx.fill();
        // Fur texture
        ctx.strokeStyle = '#311B92';
        ctx.lineWidth = 0.5;
        for (let fa = 0; fa < Math.PI * 2; fa += 0.6) {
            ctx.beginPath();
            ctx.moveTo(Math.cos(fa) * 9, Math.sin(fa) * 11);
            ctx.lineTo(Math.cos(fa) * 12, Math.sin(fa) * 14);
            ctx.stroke();
        }
        // Wings with membrane detail
        ctx.fillStyle = '#4A148C';
        // Left wing
        ctx.beginPath();
        ctx.moveTo(-7, -3);
        ctx.lineTo(-15, -18 + wingFlap);
        ctx.lineTo(-28, -12 + wingFlap * 0.7);
        ctx.lineTo(-25, 0);
        ctx.lineTo(-18, 5);
        ctx.lineTo(-7, 3);
        ctx.fill();
        // Right wing
        ctx.beginPath();
        ctx.moveTo(7, -3);
        ctx.lineTo(15, -18 + wingFlap);
        ctx.lineTo(28, -12 + wingFlap * 0.7);
        ctx.lineTo(25, 0);
        ctx.lineTo(18, 5);
        ctx.lineTo(7, 3);
        ctx.fill();
        // Wing membrane lines
        ctx.strokeStyle = '#7B1FA2';
        ctx.lineWidth = 0.7;
        // Left
        ctx.beginPath(); ctx.moveTo(-7, 0); ctx.lineTo(-22, -8 + wingFlap * 0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-7, -2); ctx.lineTo(-18, -15 + wingFlap * 0.8); ctx.stroke();
        // Right
        ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(22, -8 + wingFlap * 0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(7, -2); ctx.lineTo(18, -15 + wingFlap * 0.8); ctx.stroke();
        // Ears
        ctx.fillStyle = '#6A1B9A';
        ctx.beginPath(); ctx.moveTo(-5, -10); ctx.lineTo(-8, -18); ctx.lineTo(-2, -12); ctx.fill();
        ctx.beginPath(); ctx.moveTo(5, -10); ctx.lineTo(8, -18); ctx.lineTo(2, -12); ctx.fill();
        // Glowing red eyes
        ctx.fillStyle = '#FF1744';
        ctx.beginPath(); ctx.arc(-4, -4, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -4, 3, 0, Math.PI * 2); ctx.fill();
        // Eye glow
        const eyeGlow = 0.2 + Math.sin(frameCount * 0.08) * 0.15;
        ctx.fillStyle = `rgba(255,23,68,${eyeGlow})`;
        ctx.beginPath(); ctx.arc(-4, -4, 6, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -4, 6, 0, Math.PI * 2); ctx.fill();
        // Eye pupils
        ctx.fillStyle = '#B71C1C';
        ctx.beginPath(); ctx.arc(-4, -4, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(4, -4, 1.5, 0, Math.PI * 2); ctx.fill();
        // Fangs
        ctx.fillStyle = '#EEE';
        ctx.beginPath(); ctx.moveTo(-2, 4); ctx.lineTo(-1, 8); ctx.lineTo(0, 4); ctx.fill();
        ctx.beginPath(); ctx.moveTo(2, 4); ctx.lineTo(3, 8); ctx.lineTo(4, 4); ctx.fill();
    } else if (e.type === 'snake') {
        // Thicker snake with patterned scales
        const headY = Math.sin((15 + frameCount * 0.2) * 0.3) * 6;
        // Body with scale pattern
        ctx.lineWidth = 8; ctx.lineCap = 'round';
        // Shadow
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.moveTo(-15, 3);
        for (let i = -15; i <= 15; i += 2) {
            ctx.lineTo(i, Math.sin((i + frameCount * 0.2) * 0.3) * 6 + 3);
        }
        ctx.stroke();
        // Main body
        const sGrad = ctx.createLinearGradient(-15, -8, -15, 8);
        sGrad.addColorStop(0, '#66BB6A');
        sGrad.addColorStop(0.5, '#4CAF50');
        sGrad.addColorStop(1, '#388E3C');
        ctx.strokeStyle = sGrad;
        ctx.beginPath(); ctx.moveTo(-15, 0);
        for (let i = -15; i <= 15; i += 2) {
            ctx.lineTo(i, Math.sin((i + frameCount * 0.2) * 0.3) * 6);
        }
        ctx.stroke();
        // Scale pattern
        ctx.strokeStyle = 'rgba(46,125,50,0.6)';
        ctx.lineWidth = 1;
        for (let i = -12; i <= 12; i += 4) {
            const sy = Math.sin((i + frameCount * 0.2) * 0.3) * 6;
            ctx.beginPath();
            ctx.arc(i, sy, 3, 0, Math.PI);
            ctx.stroke();
        }
        // Belly pattern (lighter)
        ctx.strokeStyle = 'rgba(200,230,201,0.4)';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-13, 0);
        for (let i = -13; i <= 13; i += 2) {
            ctx.lineTo(i, Math.sin((i + frameCount * 0.2) * 0.3) * 6 + 1);
        }
        ctx.stroke();
        // Head (larger, more detailed)
        ctx.fillStyle = '#2E7D32';
        ctx.beginPath(); ctx.ellipse(16, headY, 7, 6, 0.1, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#388E3C';
        ctx.beginPath(); ctx.ellipse(16, headY, 6, 5, 0.1, 0, Math.PI * 2); ctx.fill();
        // Snake eyes (slit pupils)
        ctx.fillStyle = '#FFEB3B';
        ctx.beginPath(); ctx.ellipse(19, headY - 2.5, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1B5E20';
        ctx.beginPath(); ctx.ellipse(19, headY - 2.5, 1, 2.5, 0, 0, Math.PI * 2); ctx.fill();
        // Forked tongue with animation
        const tongueLen = 8 + Math.sin(frameCount * 0.3) * 4;
        const tongueY = headY + Math.sin(frameCount * 0.15) * 1;
        ctx.strokeStyle = '#F44336'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(22, tongueY);
        ctx.lineTo(22 + tongueLen * 0.7, tongueY);
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(22 + tongueLen * 0.6, tongueY);
        ctx.lineTo(22 + tongueLen, tongueY - 3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(22 + tongueLen * 0.6, tongueY);
        ctx.lineTo(22 + tongueLen, tongueY + 3); ctx.stroke();
        // Tail (tapered)
        ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-15, Math.sin((-15 + frameCount * 0.2) * 0.3) * 6);
        ctx.quadraticCurveTo(-20, Math.sin((-18 + frameCount * 0.2) * 0.3) * 4, -22, Math.sin((-20 + frameCount * 0.2) * 0.3) * 3);
        ctx.stroke();
    }
    ctx.restore();
}

function drawParts() {
    parts.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.vy += 0.08;
        if (p.life <= 0) { parts.splice(i, 1); return; }
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        if (p.type === 'star') {
            drawStarShape(p.x, p.y, 5, p.size * p.life, p.size * p.life * 0.5);
            ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
    });

    // Collect ring effects
    collectRings.forEach((r, i) => {
        r.radius += 3;
        r.life -= 0.03;
        if (r.life <= 0) { collectRings.splice(i, 1); return; }
        ctx.strokeStyle = `rgba(255,214,0,${r.life})`;
        ctx.lineWidth = 2 * r.life;
        ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2); ctx.stroke();
    });
}

function drawStar(cx, cy, spikes, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / spikes) - Math.PI / 2;
        ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    }
    ctx.closePath(); ctx.fill();
}

function drawFloatTexts() {
    floatTexts.forEach((ft, i) => {
        ft.y -= 1.5; ft.life -= 0.02;
        if (ft.life <= 0) { floatTexts.splice(i, 1); return; }
        ctx.globalAlpha = ft.life;
        // Text shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.font = `bold ${ft.size}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
        ctx.fillStyle = ft.color;
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.globalAlpha = 1;
    });
}

// Mini banana icon for UI
function drawMiniBanana(x, y, size) {
    ctx.save();
    ctx.translate(x, y);
    const s = size;
    ctx.fillStyle = '#FFD600';
    ctx.beginPath(); ctx.moveTo(-s / 2, 0);
    ctx.quadraticCurveTo(-s / 2, -s, 0, -s);
    ctx.quadraticCurveTo(s / 2, -s, s / 2, 0);
    ctx.quadraticCurveTo(s / 3, s / 3, 0, s / 4);
    ctx.quadraticCurveTo(-s / 3, s / 3, -s / 2, 0);
    ctx.fill();
    ctx.fillStyle = '#795548';
    ctx.beginPath(); ctx.arc(0, -s + 1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
}

function drawScore() {
    // Score with outline + shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;
    drawTextOutline('' + score, GW / 2, 70, '#FFF', '#000', 'bold 48px Arial');
    ctx.restore();

    // Banana counter with mini banana icon
    ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left';
    drawMiniBanana(22, 26, 10);
    ctx.fillStyle = '#000'; ctx.fillText(bananaCount, 36, 32);
    ctx.fillStyle = '#FFD600'; ctx.fillText(bananaCount, 35, 31);

    // Combo
    if (comboMultiplier > 1) {
        const comboPulse = 1 + Math.sin(frameCount * 0.2) * 0.1;
        ctx.save();
        ctx.translate(GW - 30, 25);
        ctx.scale(comboPulse, comboPulse);
        drawTextOutline(`x${comboMultiplier}`, 0, 7, '#FF5722', '#000', 'bold 22px Arial');
        ctx.restore();
    }

    // Power-up indicator
    if (activePower.type) {
        const pct = activePower.timer / (activePower.type === 'golden' ? 180 : 300);
        const barColor = activePower.type === 'golden' ? '#FFD700' : '#2196F3';
        // Bar background
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        drawRoundRect(GW / 2 - 52, 84, 104, 10, 5);
        ctx.fill();
        // Bar fill
        const bGrad = ctx.createLinearGradient(GW / 2 - 50, 0, GW / 2 + 50, 0);
        bGrad.addColorStop(0, barColor);
        bGrad.addColorStop(1, activePower.type === 'golden' ? '#FFA000' : '#0D47A1');
        ctx.fillStyle = bGrad;
        drawRoundRect(GW / 2 - 50, 85, 100 * pct, 8, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
        drawRoundRect(GW / 2 - 51, 84, 102, 10, 5);
        ctx.stroke();
    }

    // Near record warning
    if (highScore > 0 && score >= highScore - 3 && score < highScore && !nearRecordShown) {
        nearRecordShown = true;
    }
    if (nearRecordShown && score < highScore) {
        const diff = highScore - score;
        const pulse = 0.7 + Math.sin(frameCount * 0.15) * 0.3;
        ctx.globalAlpha = pulse;
        drawTextOutline(lang.nearRecord(diff), GW / 2, 115, '#FF5722', '#000', 'bold 16px Arial');
        ctx.globalAlpha = 1;
    }
    if (score > highScore && score > 0) {
        const pulse = 0.7 + Math.sin(frameCount * 0.1) * 0.3;
        ctx.globalAlpha = pulse;
        drawTextOutline(lang.newRecord, GW / 2, 115, '#FFD600', '#000', 'bold 18px Arial');
        ctx.globalAlpha = 1;
    }

    // Milestone progress
    let nextMilestone = milestones.find(m => score < m);
    if (nextMilestone) {
        const pct = score / nextMilestone;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        drawRoundRect(10, GH - 76, GW - 20, 5, 2.5);
        ctx.fill();
        ctx.fillStyle = '#FFD600';
        drawRoundRect(10, GH - 76, (GW - 20) * pct, 5, 2.5);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '10px Arial'; ctx.textAlign = 'right';
        ctx.fillText(lang.target(nextMilestone), GW - 10, GH - 80);
    }

    // Theme name
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px Arial'; ctx.textAlign = 'right';
    ctx.fillText(getTheme().name, GW - 10, GH - 68);

    // Top right buttons: Music | SFX | Pause
    // Music toggle
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(GW - 120, 8, 30, 30, 6); ctx.fill();
    ctx.fillStyle = musicEnabled ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)';
    ctx.font = '16px Arial'; ctx.textAlign = 'center';
    ctx.fillText('🎵', GW - 105, 29);

    // SFX toggle
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(GW - 82, 8, 30, 30, 6); ctx.fill();
    ctx.fillStyle = sfxEnabled ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.3)';
    ctx.fillText('🔊', GW - 67, 29);

    // Pause button
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(GW - 44, 8, 34, 30, 6); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillRect(GW - 36, 14, 5, 18);
    ctx.fillRect(GW - 26, 14, 5, 18);
}

// ===== SCREEN EDGE GLOW =====
function drawScreenGlow() {
    if (screenGlow.alpha <= 0) return;
    const rgb = screenGlow.color === 'gold' ? '255,215,0' : '33,150,243';
    // Top
    let grad = ctx.createLinearGradient(0, 0, 0, 60);
    grad.addColorStop(0, `rgba(${rgb},${screenGlow.alpha * 0.5})`);
    grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, 60);
    // Bottom
    grad = ctx.createLinearGradient(0, GH, 0, GH - 60);
    grad.addColorStop(0, `rgba(${rgb},${screenGlow.alpha * 0.5})`);
    grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, GH - 60, GW, 60);
    // Left
    grad = ctx.createLinearGradient(0, 0, 40, 0);
    grad.addColorStop(0, `rgba(${rgb},${screenGlow.alpha * 0.4})`);
    grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 40, GH);
    // Right
    grad = ctx.createLinearGradient(GW, 0, GW - 40, 0);
    grad.addColorStop(0, `rgba(${rgb},${screenGlow.alpha * 0.4})`);
    grad.addColorStop(1, `rgba(${rgb},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(GW - 40, 0, 40, GH);
}

// ===== BUTTON DRAWING HELPER =====
function drawButton(x, y, w, h, r, color1, color2, text, font, textColor, pressed) {
    const scale = pressed ? 0.95 : 1;
    ctx.save();
    ctx.translate(x + w / 2, y + h / 2);
    ctx.scale(scale, scale);
    const bx = -w / 2, by = -h / 2;
    // Shadow
    ctx.fillStyle = color2 || 'rgba(0,0,0,0.3)';
    drawRoundRect(bx, by + 3, w, h, r);
    ctx.fill();
    // Button body gradient
    const bGrad = ctx.createLinearGradient(bx, by, bx, by + h);
    bGrad.addColorStop(0, color1);
    bGrad.addColorStop(1, color2 || color1);
    ctx.fillStyle = bGrad;
    drawRoundRect(bx, by, w, h, r);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    drawRoundRect(bx + 2, by + 2, w - 4, h / 2 - 2, r);
    ctx.fill();
    // Text
    ctx.fillStyle = textColor || '#FFF';
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.fillText(text, 0, 5);
    ctx.restore();
}

function getRank(s) {
    if (s >= 200) return { name: 'Diamond', icon: '💎', color: '#00BCD4' };
    if (s >= 100) return { name: 'Gold', icon: '🥇', color: '#FFD600' };
    if (s >= 50) return { name: 'Silver', icon: '🥈', color: '#9E9E9E' };
    if (s >= 20) return { name: 'Bronze', icon: '🥉', color: '#FF8A65' };
    return { name: '', icon: '', color: '' };
}

function haptic(type) {
    if (navigator.vibrate) {
        if (type === 'light') navigator.vibrate(15);
        else if (type === 'medium') navigator.vibrate(30);
        else if (type === 'heavy') navigator.vibrate([50, 30, 50]);
    }
}

function drawCountdown() {
    // Vẽ game phía dưới (tĩnh, chưa chạy)
    drawSky(); drawParallax(); drawClouds(); drawGround(); drawMonkey();

    // Overlay mờ
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, GW, GH);

    const remaining = Math.ceil(countdownTimer / 60); // 3, 2, 1

    if (remaining > 0) {
        // Số đếm ngược lớn
        const scale = 1 + (countdownTimer % 60) / 60 * 0.5; // Phóng to rồi thu nhỏ
        const alpha = Math.min(1, (countdownTimer % 60) / 30);

        ctx.save();
        ctx.translate(GW / 2, GH / 2 - 30);
        ctx.scale(scale, scale);
        ctx.globalAlpha = alpha;

        // Vòng tròn nền
        ctx.fillStyle = remaining === 3 ? '#F44336' : remaining === 2 ? '#FF9800' : '#4CAF50';
        ctx.beginPath();
        ctx.arc(0, 0, 50, 0, Math.PI * 2);
        ctx.fill();

        // Số
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(remaining, 0, 22);

        ctx.globalAlpha = 1;
        ctx.restore();

        // Text bên dưới
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(lang.ready, GW / 2, GH / 2 + 60);
    } else {
        // "GO!" flash
        const goAlpha = countdownTimer > -30 ? 1 : Math.max(0, 1 + countdownTimer / 30);
        ctx.globalAlpha = goAlpha;
        ctx.fillStyle = '#4CAF50';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(lang.go, GW / 2, GH / 2);
        ctx.globalAlpha = 1;
    }
}

function drawTutorial() {

    tutorialHandY = Math.sin(frameCount * 0.08) * 15; // Tay lên xuống

    if (tutorialStep === 1) {

        ctx.fillStyle = '#FFF';

        ctx.fillText(lang.tutorialTap, GW / 2, 170);

        // Vẽ tay chạm animation

        ctx.strokeStyle = '#FFD600';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);

        ctx.moveTo(mk.x + mk.w / 2, mk.y - 10);
        ctx.lineTo(mk.x + mk.w / 2, mk.y - 40);

        ctx.lineTo(mk.x + mk.w / 2 + 8, mk.y - 35);

    if (tutorialStep === 2) {
        // Hướng dẫn tránh cây

        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';

        ctx.fillStyle = 'rgba(0,0,0,0.5)';

        ctx.fillStyle = '#FFF';

        ctx.fillStyle = '#4CAF50';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(lang.tutorialGood, GW / 2, 170);

}

function drawRevive() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, GW, GH);

    // Panel
    ctx.fillStyle = '#FFF';
    drawRoundRect(GW / 2 - 130, 200, 260, 260, 16);

    }

    // Skip button
    drawButton(GW / 2 - 60, 428, 120, 30, 6, '#F44336', '#C62828', lang.skip, 'bold 13px Arial', '#FFF');

// ===== GAME LOGIC =====

function spawn() {
    const th = Math.floor(Math.random() * (GH - 60 - currentGap - 160)) + 80;
    const by = th + currentGap;
    obs.push({ x: GW, th, by, scored: false });

    const rand = Math.random();
    if (rand < 0.05 && score > 5) {
        powerups.push({ x: GW + OW / 2, y: th + currentGap / 2, type: 'golden' });
    } else if (rand < 0.08 && score > 10) {
        powerups.push({ x: GW + OW / 2, y: th + currentGap / 2, type: 'magnet' });
    } else {
        bans.push({ x: GW + OW / 2, y: th + currentGap / 2, s: 18, col: false });
    }
}

function spawnEnemy() {
    const types = currentThemeIdx >= 2 ? ['bee', 'bat', 'snake'] : ['bee', 'snake'];
    const type = types[Math.floor(Math.random() * types.length)];
    const y = 100 + Math.random() * (GH - 250);
    enemies.push({ type, x: GW + 30, y, baseY: y, vx: speed * 1.2 + 1, w: 25, h: 15, frame: 0 });
}

function spawnP(x, y, c, n, type) {
    for (let i = 0; i < Math.min(n, 50 - parts.length); i++)
        parts.push({ x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: Math.random() * 4 + 2, life: 1, color: c, type: type || 'circle' });
}

function checkCol() {
    if (activePower.type === 'golden') return false;
    const px = mk.x + 8, py = mk.y + 8, pw = mk.w - 16, ph = mk.h - 16;
    if (py + ph >= GH - 60 || py <= 0) return true;
    for (const o of obs)
        if (px + pw > o.x && px < o.x + OW && (py < o.th || py + ph > o.by)) return true;
    for (const e of enemies) {
        const ex = e.x - e.w, ey = e.y - e.h;
        if (px + pw > ex && px < ex + e.w * 2 && py + ph > ey && py < ey + e.h * 2) return true;
    }
    return false;
}

function checkBan() {
    bans.forEach(b => {
        if (b.col) return;
        const dx = (mk.x + mk.w / 2) - b.x, dy = (mk.y + mk.h / 2) - b.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
            b.col = true;
            combo++; comboTimer = 90;
            comboMultiplier = Math.min(Math.floor(combo / 3) + 1, 5);
            bananaCount += comboMultiplier;
            sfxCollect(comboMultiplier - 1); haptic('light');
            spawnP(b.x, b.y, '#FFD600', 8, comboMultiplier > 1 ? 'star' : 'circle');
            // Expanding ring effect
            collectRings.push({ x: b.x, y: b.y, radius: 5, life: 1 });
            if (comboMultiplier > 1) {
                floatTexts.push({ x: b.x, y: b.y, text: `x${comboMultiplier}!`, color: '#FF5722', size: 20, life: 1 });
            }
        }
    });
    // Power-ups
    powerups.forEach((p, i) => {
        const dx = (mk.x + mk.w / 2) - p.x, dy = (mk.y + mk.h / 2) - p.y;
        if (Math.sqrt(dx * dx + dy * dy) < 30) {
            activePower = { type: p.type, timer: p.type === 'golden' ? 180 : 300 };
            powerups.splice(i, 1);
            sfxPowerUp();
            spawnP(p.x, p.y, p.type === 'golden' ? '#FFD700' : '#2196F3', 12, 'star');
            floatTexts.push({ x: p.x, y: p.y, text: p.type === 'golden' ? lang.invincible : lang.magnet, color: '#FFF', size: 16, life: 1.5 });
            // Screen edge glow
            screenGlow = { color: p.type === 'golden' ? 'gold' : 'blue', alpha: 0.6 };
        }
    });
}

function reset() {
    mk.y = GH / 2; mk.vel = 0; mk.rot = 0;
    obs = []; bans = []; enemies = []; powerups = []; parts = []; floatTexts = [];
    collectRings = [];
    activePower = { type: null, timer: 0 };
    screenGlow = { color: null, alpha: 0 };
    deathAnim = { active: false, spin: 0, trail: [], particles: [] };
    score = 0; bananaCount = 0; speed = SPD; oTimer = 0; enemyTimer = 0;
    frameCount = 0; combo = 0; comboTimer = 0; comboMultiplier = 1;
    currentGap = 160; currentInterval = 100;
    currentThemeIdx = 0; prevThemeIdx = 0; themeTransition = 0;
    canRevive = false; revived = false; slowMoTimer = 0; shakeTimer = 0;
    nearRecordShown = false;
    countdownTimer = 180; // 3 seconds at 60fps
    isTutorial = !tutorialPlayed;
    tutorialStep = isTutorial ? 1 : 0;
    tutorialHandY = 0;
}

function jump() {
    initAudio();
    if (gameState === 'menu') {
        gameState = 'countdown';
        reset();
        startBGM();
        return;
    }
    if (gameState === 'countdown') return; // Không cho nhảy khi đếm ngược
    if (gameState === 'playing') {
        mk.vel = mk.jmp;
        sfxJump();
        spawnP(mk.x, mk.y + mk.h, 'rgba(255,255,255,0.5)', 3);
    }
    if (gameState === 'gameover') { gameState = 'menu'; }
}

function shareScore() {
    const text = lang.shareText(score);
    if (navigator.share) {
        navigator.share({ title: 'Monkey Hop', text });
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text);
        floatTexts.push({ x: GW / 2, y: GH / 2, text: lang.copied, color: '#4CAF50', size: 20, life: 1.5 });
    }
}

// ===== UPDATE =====

function update() {
    // Countdown phase
    if (gameState === 'countdown') {
        countdownTimer--;
        if (countdownTimer <= -30) {
            gameState = 'playing';
        }
        return;
    }

    // Update screen glow fade
    if (screenGlow.alpha > 0) {
        screenGlow.alpha -= 0.008;
        if (activePower.type) screenGlow.alpha = Math.max(screenGlow.alpha, 0.15);
    }

    // Update theme transition
    if (themeTransition > 0) themeTransition--;

    if (gameState !== 'playing') return;
    frameCount++;
    mk.vel += mk.grav; mk.y += mk.vel;

    // Tutorial logic
    if (isTutorial) {
        if (tutorialStep === 1 && mk.vel < 0) {
            // Người chơi đã chạm → chuyển sang bước 2
            tutorialStep = 2;
        }
        if (tutorialStep === 2 && score >= 1) {
            // Qua ống đầu tiên → bước 3
            tutorialStep = 3;
        }
        if (tutorialStep === 3 && bananaCount >= 1) {
            // Ăn chuối đầu tiên → giỏi lắm!
            tutorialStep = 4;
            setTimeout(() => {
                tutorialStep = 0;
                isTutorial = false;
                tutorialPlayed = true;
                localStorage.setItem('msTutorial', '1');
            }, 1500);
        }
    }

    // Difficulty (rebalanced: pro có thể đạt 200-300 điểm)
    if (isTutorial && score < 3) {
        speed = SPD * 0.8;
        currentGap = 200;
        currentInterval = 120;
    } else {
        // Tốc độ tăng rất chậm: max 5.5 thay vì 8
        speed = SPD + Math.floor(score / 10) * 0.15;
        speed = Math.min(speed, 5.5);
        // Gap thu hẹp chậm: 160 → min 135 (trước 120)
        currentGap = Math.max(135, 160 - score * 0.2);
        // Ống xuất hiện thưa hơn: min 75 thay vì 65
        currentInterval = Math.max(75, 100 - score * 0.2);
    }

    // Theme transition
    const prevIdx = currentThemeIdx;
    for (let i = themes.length - 1; i >= 0; i--) {
        if (score >= themes[i].minScore) { currentThemeIdx = i; break; }
    }
    if (currentThemeIdx !== prevIdx) {
        prevThemeIdx = prevIdx;
        themeTransition = 60;
    }

    // Combo timer
    if (comboTimer > 0) { comboTimer--; } else { combo = 0; comboMultiplier = 1; }

    // Power-up timer
    if (activePower.timer > 0) {
        activePower.timer--;
        if (activePower.timer <= 0) {
            activePower = { type: null, timer: 0 };
            screenGlow = { color: null, alpha: 0 };
        }
    }

    // Magnet effect
    if (activePower.type === 'magnet') {
        bans.forEach(b => {
            if (b.col) return;
            const dx = (mk.x + mk.w / 2) - b.x, dy = (mk.y + mk.h / 2) - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) { b.x += dx * 0.08; b.y += dy * 0.08; }
        });
    }

    // Obstacles
    oTimer++;
    if (oTimer >= currentInterval) { spawn(); oTimer = 0; }
    obs.forEach(o => { o.x -= speed; if (!o.scored && o.x + OW < mk.x) { o.scored = true; score++; } });
    obs = obs.filter(o => o.x > -OW);

    // Bananas & power-ups
    bans.forEach(b => b.x -= speed);
    bans = bans.filter(b => b.x > -30);
    powerups.forEach(p => p.x -= speed);
    powerups = powerups.filter(p => p.x > -30);

    // Enemies
    enemyTimer++;
    // Enemy: xuất hiện từ điểm 8+, tần suất tăng chậm, min 120 (trước 80)
    if (!isTutorial && enemyTimer >= Math.max(120, 250 - score * 1.5) && score > 8) { spawnEnemy(); enemyTimer = 0; }
    enemies.forEach(e => {
        e.x -= e.vx;
        e.frame++;
        if (e.type === 'bee') e.y = e.baseY + Math.sin(e.frame * 0.05) * 30;
        if (e.type === 'bat') e.y = e.baseY + Math.sin(e.frame * 0.08) * 40 + Math.cos(e.frame * 0.03) * 20;
    });
    enemies = enemies.filter(e => e.x > -50);

    // Clouds
    clouds.forEach(c => { c.x -= c.s; if (c.x < -c.w) c.x = GW + c.w; });
    gX += speed;

    checkBan();

    // Milestone check
    milestones.forEach(m => {
        if (score === m && !milestoneUnlocked.includes(m)) {
            milestoneUnlocked.push(m);
            localStorage.setItem('msMilestones', JSON.stringify(milestoneUnlocked));
            floatTexts.push({ x: GW / 2, y: GH / 2 - 50, text: lang.milestone(m), color: '#FFD600', size: 24, life: 2 });
            bananaCount += m;
            floatTexts.push({ x: GW / 2, y: GH / 2 - 20, text: `+${m} banana`, color: '#FF9800', size: 18, life: 1.5 });
            sfxPowerUp();
        }
    });

    // Slow motion countdown
    if (slowMoTimer > 0) {
        slowMoTimer--;
        return;
    }

    if (checkCol()) {
        shakeTimer = 15;
        sfxHit();
        deathText = lang.died();
        haptic('heavy');

        // Death particles explosion
        const deathColors = ['#F44336', '#FF5722', '#FF9800', '#FFD600', '#FFF', '#E91E63'];
        for (let dp = 0; dp < 25; dp++) {
            const angle = (dp / 25) * Math.PI * 2;
            const spd = 3 + Math.random() * 5;
            parts.push({
                x: mk.x + mk.w / 2, y: mk.y + mk.h / 2,
                vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                size: 3 + Math.random() * 5, life: 1.2,
                color: deathColors[Math.floor(Math.random() * deathColors.length)],
                type: Math.random() > 0.5 ? 'star' : 'circle'
            });
        }

        if (!revived) {
            canRevive = true;
            revived = true;
            gameState = 'revive';
            slowMoTimer = 0;
            stopBGM();
        } else {
            gameState = 'gameover';
            stopBGM();
            totalBananas += bananaCount;
            localStorage.setItem('msTB', totalBananas + '');
            if (score > highScore) { highScore = score; localStorage.setItem('msHS', highScore + ''); }
        }
    }
}

// ===== RENDER =====

function render() {
    ctx.clearRect(0, 0, GW, GH);
    // Splash screen
    if (splashTimer > 0) { splashTimer--; drawSplash(); return; }

    if (gameState === 'menu') { drawMenu(); return; }
    if (gameState === 'shop') { drawShop(); return; }
    if (gameState === 'countdown') { drawCountdown(); return; }

    // Screen shake
    ctx.save();
    if (shakeTimer > 0) {
        shakeTimer--;
        const sx = (Math.random() - 0.5) * shakeTimer * 1.5;
        const sy = (Math.random() - 0.5) * shakeTimer * 1.5;
        ctx.translate(sx, sy);
    }

    drawSky(); drawParallax(); drawClouds(); drawAmbientParticles();
    obs.forEach(o => drawTree(o.x, o.th, o.by));
    bans.forEach(b => { if (!b.col) drawBanana(b.x, b.y, b.s); });
    powerups.forEach(p => drawPowerUpItem(p));
    enemies.forEach(e => drawEnemy(e));
    drawGround(); drawMonkey(); drawParts(); drawFloatTexts(); drawScore(); drawTutorial();

    // Screen edge glow for power-ups
    drawScreenGlow();

    // Red flash when hit
    if (shakeTimer > 10) {
        ctx.fillStyle = `rgba(255,0,0,${shakeTimer * 0.025})`;
        ctx.fillRect(0, 0, GW, GH);
    }

    // Vignette
    drawVignette();

    ctx.restore();

    if (gameState === 'revive') drawRevive();
    if (gameState === 'gameover') drawGameOver();
    if (gameState === 'paused') drawPause();
}

function loop() { update(); render(); requestAnimationFrame(loop); }

// ===== INPUT =====

function handleTap(tx, ty) {
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const x = (tx - rect.left) * GW / rect.width;
    const y = (ty - rect.top) * GH / rect.height;

    if (gameState === 'menu') {
        if (y > 370 && y < 420 && x > GW / 2 - 80 && x < GW / 2 + 80) { jump(); return; }
        if (y > 436 && y < 476 && x > GW / 2 - 80 && x < GW / 2 + 80) { gameState = 'shop'; shopScroll = 0; return; }
        jump();
    } else if (gameState === 'shop') {
        if (y > GH - 70 && y < GH - 34) { gameState = 'menu'; return; }
        const startY = 100 - shopScroll;
        skins.forEach((s, i) => {
            const sy = startY + i * 100;
            if (x > GW - 115 && x < GW - 45 && y > sy + 30 && y < sy + 60) {
                const owned = unlockedSkins.includes(s.id);
                if (!owned && totalBananas >= s.cost) {
                    totalBananas -= s.cost;
                    unlockedSkins.push(s.id);
                    currentSkin = s.id;
                    localStorage.setItem('msTB', totalBananas + '');
                    localStorage.setItem('msSkins', JSON.stringify(unlockedSkins));
                    localStorage.setItem('msCSkin', currentSkin);
                } else if (owned) {
                    currentSkin = s.id;
                    localStorage.setItem('msCSkin', currentSkin);
                }
            }
        });
    } else if (gameState === 'revive') {
        if (y > 378 && y < 418 && x > GW / 2 - 100 && x < GW / 2 + 100) {
            gameState = 'playing';
            mk.y = GH / 2; mk.vel = 0;
            activePower = { type: 'golden', timer: 120 };
            screenGlow = { color: 'gold', alpha: 0.6 };
            startBGM();
            sfxPowerUp();
            floatTexts.push({ x: GW / 2, y: GH / 2, text: lang.revived, color: '#4CAF50', size: 24, life: 1.5 });
            return;
        }
        if (y > 428 && y < 458) {
            gameState = 'gameover';
            totalBananas += bananaCount;
            localStorage.setItem('msTB', totalBananas + '');
            if (score > highScore) { highScore = score; localStorage.setItem('msHS', highScore + ''); }
            spawnP(mk.x + mk.w / 2, mk.y + mk.h / 2, '#F44336', 20);
            return;
        }
    } else if (gameState === 'paused') {
        // Resume button
        if (y > GH / 2 + 45 && y < GH / 2 + 83) { paused = false; gameState = 'playing'; startBGM(); return; }
        // Quit button
        if (y > GH / 2 + 92 && y < GH / 2 + 122) {
            paused = false; gameState = 'menu'; stopBGM();
            totalBananas += bananaCount;
            localStorage.setItem('msTB', totalBananas + '');
            if (score > highScore) { highScore = score; localStorage.setItem('msHS', highScore + ''); }
            return;
        }
    } else if (gameState === 'playing') {
        // Top right buttons
        if (y < 45) {
            if (x > GW - 120 && x < GW - 90) { musicEnabled = !musicEnabled; musicEnabled ? startBGM() : stopBGM(); return; }
            if (x > GW - 82 && x < GW - 52) { sfxEnabled = !sfxEnabled; return; }
            if (x > GW - 44) { paused = true; gameState = 'paused'; stopBGM(); return; }
        }
        jump();
    } else if (gameState === 'gameover') {
        if (y > 398 && y < 438) { jump(); return; }
        if (y > 449 && y < 482) { shareScore(); return; }
        if (y > 495 && y < 521) { gameState = 'menu'; return; }
    }
}

canvas.addEventListener('pointerdown', e => { e.preventDefault(); handleTap(e.clientX, e.clientY); });
document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
    if (e.code === 'KeyM') { musicEnabled = !musicEnabled; musicEnabled ? startBGM() : stopBGM(); }
    if (e.code === 'Escape') {
        if (gameState === 'playing') { paused = true; gameState = 'paused'; stopBGM(); }
        else if (gameState === 'paused') { paused = false; gameState = 'playing'; startBGM(); }
    }
});

// Touch scroll in shop
let touchStartY = 0;
canvas.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchmove', e => {
    if (gameState === 'shop') {
        shopScroll += touchStartY - e.touches[0].clientY;
        shopScroll = Math.max(0, Math.min(shopScroll, skins.length * 100 - 400));
        touchStartY = e.touches[0].clientY;
    }
}, { passive: true });

// Resize
function resize() {
    const r = Math.min(window.innerWidth / GW, window.innerHeight / GH);
    canvas.style.width = GW * r + 'px'; canvas.style.height = GH * r + 'px';
}
window.addEventListener('resize', resize); resize();

// Auto-pause khi chuyển tab/app
document.addEventListener('visibilitychange', () => {
    if (document.hidden && gameState === 'playing') {
        paused = true; gameState = 'paused'; stopBGM();
    }
});

// Register Service Worker cho PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}

loop();
</script>
</body>
